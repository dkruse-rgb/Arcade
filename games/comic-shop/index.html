function shopW(){return SHOP_SIZES[S.shopSize].w}function shopH(){return SHOP_SIZES[S.shopSize].h}function save(){localStorage.setItem(SAVE,JSON.stringify(S))}function log(t){S.log=[t].concat(S.log).slice(0,28);save()}function lvl(x){var l=1;while(x>=Math.floor(50*Math.pow(l+1,1.55)))l++;return l}function xp(s,v){S.skills[s]=(S.skills[s]||0)+v}function hasUpgrade(id){return S.upgrades.indexOf(id)>=0}function floorCap(){return S.racks.reduce(function(a,r){return a+RACKS[r.id].cap},0)}function totalFloor(){return Object.values(S.floor).reduce(function(a,b){return a+(+b||0)},0)}function totalStock(){return Object.values(S.stock).reduce(function(a,b){return a+(+b||0)},0)}function rackCount(){return S.racks.length}function money(n){return '$'+Math.floor(n)}
function resize(){var r=G.getBoundingClientRect();if(r.width>1&&r.height>1){G.width=r.width|0;G.height=r.height|0}}window.addEventListener('resize',resize);if(window.ResizeObserver)new ResizeObserver(resize).observe(G);setTimeout(resize,0);resize();
var TW=52,TH=28;function basis(){var l=CAMS[S.cam],d={N:[[1,0],[0,-1],0],NE:[[1,-1],[-1,-1],1],E:[[0,1],[1,0],0],SE:[[1,1],[1,-1],1],S:[[-1,0],[0,1],0],SW:[[-1,1],[1,1],1],W:[[0,-1],[-1,0],0],NW:[[-1,-1],[-1,1],1]}[l];function n(v){var m=Math.hypot(v[0],v[1])||1;return[v[0]/m,v[1]/m]}return{r:n(d[0]),u:n(d[1]),iso:!!d[2]}}
function wp(wx,wy,wz){wz=wz||0;var b=basis(),lx=wx-anim.vx,ly=wy-anim.vy,sx=lx*b.r[0]+ly*b.r[1],sy=lx*b.u[0]+ly*b.u[1],px,py;if(b.iso){px=sx*TW*.52;py=-sy*TH*.72-wz*24}else{px=sx*46;py=-sy*38-wz*24}return{x:px+G.width/2,y:py+G.height/2+16}}
function tcorners(x,y){return[wp(x,y),wp(x+1,y),wp(x+1,y+1),wp(x,y+1)]}function ec(e,z){z=z||0;return wp(e.x+(e.w||1)/2,e.y+(e.h||1)/2,z)}function screenToTile(sx,sy){var b=basis(),dx=sx-G.width/2,dy=sy-G.height/2-16,a,bb,cc,dd,det,lx,ly;if(b.iso){a=b.r[0]*TW*.52;bb=b.r[1]*TW*.52;cc=-b.u[0]*TH*.72;dd=-b.u[1]*TH*.72}else{a=b.r[0]*46;bb=b.r[1]*46;cc=-b.u[0]*38;dd=-b.u[1]*38}det=a*dd-bb*cc;if(Math.abs(det)<.001)return null;lx=(dx*dd-bb*dy)/det;ly=(a*dy-dx*cc)/det;return{tx:Math.floor(lx+anim.vx),ty:Math.floor(ly+anim.vy)}}

function canWalk(x,y){if(x<.3||y<.3||x>shopW()-.3||y>shopH()-.3)return false;return !fixedEnts().concat(rackEnts()).some(function(e){return e.solid&&x>e.x-.15&&x<e.x+(e.w||1)+.15&&y>e.y-.15&&y<e.y+(e.h||1)+.15})}

function makeNpc(){var doorX=Math.floor((shopW()-1)/2)+.5,shirts=['#c0392b','#2980b9','#27ae60','#8e44ad','#d35400'];return{id:'npc_'+npcSeq++,name:'Customer',kind:'npc',x:doorX,y:.55,w:1,h:1,solid:false,target:{x:doorX,y:1.5},state:'entering',timer:0,browseCount:0,item:null,spend:0,float:0,shirt:shirts[(Math.random()*shirts.length)|0],speed:1.15+Math.random()*.35}}

function updateCustomers(dt){if(S.shopOpen&&rackCount()>0&&totalFloor()>0){npcClock+=dt;var max=Math.min(5,Math.max(1,rackCount()+Math.floor(totalFloor()/15))),interval=hasUpgrade('sign')?3.1:4.2;if(NPCS.length<max&&npcClock>interval){npcClock=0;NPCS.push(makeNpc())}}for(var i=NPCS.length-1;i>=0;i--){var n=NPCS[i];if(n.float>0)n.float-=dt;if((!S.shopOpen||totalFloor()<=0)&&n.state!=='leaving')leave(n);if(n.state==='leaving'){var ex=exitTarget();if(n.exiting){n.y-=dt*1.8;if(n.y<-.35)NPCS.splice(i,1);continue}if(Math.hypot(ex.x-n.x,ex.y-n.y)<.18){n.exiting=true;continue}moveNpc(n,dt);continue}var arrived=moveNpc(n,dt);if(n.state==='entering'&&arrived){n.state='browsing';n.timer=.7+Math.random()*1.2;setTarget(n,pickSpot())}else if(n.state==='browsing'&&arrived){n.timer-=dt;if(n.timer<=0){if(S.shopOpen&&totalFloor()>0&&Math.random()<(hasUpgrade('pulllist')?.82:.7))sellToCustomer(n);else if(S.shopOpen&&totalFloor()>0&&n.browseCount<3){n.browseCount++;n.timer=.6+Math.random()*1.1;setTarget(n,pickSpot())}else leave(n)}}}}
function update(dt){updateCustomers(dt);if(placing)return;var dx=0,dy=0;if(keys.up||keys.ArrowUp||keys.w)dy--;if(keys.down||keys.ArrowDown||keys.s)dy++;if(keys.left||keys.ArrowLeft||keys.a)dx--;if(keys.right||keys.ArrowRight||keys.d)dx++;anim.moving=!!(dx||dy);if(anim.moving){if(Math.abs(dx)>=Math.abs(dy))anim.dir=dx>0?'right':'left';else anim.dir=dy<0?'up':'down';var m=Math.hypot(dx,dy);dx/=m;dy/=m;var b=basis(),wx=b.r[0]*dx+b.u[0]*(-dy),wy=b.r[1]*dx+b.u[1]*(-dy),sp=3.2*dt,nx=S.player.x+wx*sp,ny=S.player.y+wy*sp;if(canWalk(nx,S.player.y))S.player.x=nx;if(canWalk(S.player.x,ny))S.player.y=ny;anim.wt+=dt*5.5;anim.phase=(anim.wt%(Math.PI*2))/(Math.PI*2)}anim.vx+=(S.player.x-anim.vx)*8*dt;anim.vy+=(S.player.y-anim.vy)*8*dt}

function useNear(){var n=nearEnts().filter(function(e){return e.kind!=='computer'});if(!n.length){log('Nothing nearby.');return}if(n.length===1){doInteract(n[0]);return}modal('Nearby',n.map(function(e,i){return'<button onclick="doInteract(nearEnts().filter(function(x){return x.kind!==\'computer\'})['+i+']);closeModal()">'+e.name+'</button>'}).join(' '))}function doInteract(e){if(!e)return;if(e.kind==='sign'){S.shopOpen=!S.shopOpen;log('Shop is now '+(S.shopOpen?'OPEN':'CLOSED')+'.');save();customersPanel()}else if(e.kind==='rack')modal('🗄 '+e.name,'<div class="card"><button onclick="stockPanel()">Stock rack</button><br><br><button onclick="startMoving('+e.rackIdx+')">Move rack</button></div>');else if(e.kind==='npc')modal('Customer','<div class="card">'+(e.spend?'Just spent '+money(e.spend):e.state==='leaving'?'Leaving':'Browsing')+'</div>')}window.doInteract=doInteract;window.nearEnts=nearEnts;
function endDay(){S.day++;S.revenue=0;S.sales=0;S.shopOpen=false;NPCS=[];log('Closed for the day. Flip the sign open when ready.');save();render();closeModal()}
document.addEventListener('selectstart',function(e){if(e.target.closest&&e.target.closest('.dpad,.acts,#use,.tray,button,canvas'))e.preventDefault()},true);document.addEventListener('contextmenu',function(e){if(e.target.closest&&e.target.closest('.dpad,.acts,#use,.tray,button,canvas'))e.preventDefault()},true);document.addEventListener('dragstart',function(e){if(e.target.closest&&e.target.closest('.dpad,.acts,#use,.tray,button,canvas'))e.preventDefault()},true);setInterval(function(){try{window.getSelection&&window.getSelection().removeAllRanges()}catch(_){}} ,500);window.addEventListener('keydown',function(e){keys[e.key]=1;if(e.key==='Escape')cancelPlace()});window.addEventListener('keyup',function(e){keys[e.key]=0});document.querySelectorAll('[data-dir]').forEach(function(b){var d=b.dataset.dir;b.addEventListener('pointerdown',function(e){e.preventDefault();keys[d]=1});b.addEventListener('pointerup',function(e){e.preventDefault();keys[d]=0});b.addEventListener('pointerleave',function(){keys[d]=0});b.addEventListener('pointercancel',function(){keys[d]=0})});$('use').onclick=useNear;$('btnPC').onclick=function(){computerPanel()};$('btnSales').onclick=salesPanel;$('btnSt').onclick=stockPanel;$('btnCust').onclick=customersPanel;$('btnSkill').onclick=skillsPanel;$('btnLog').onclick=logPanel;$('btnMenu').onclick=function(){modal('≡ Menu','<div class="g2"><button onclick="save();log(\'Saved.\');closeModal()">💾 Save</button><button onclick="endDay()">🌙 End Day</button><button onclick="if(confirm(\'Reset?\')){localStorage.removeItem(SAVE);location.reload()}">🗑 Reset</button><button onclick="closeModal()">Back</button></div>')};$('camBtn').onclick=function(){ui.cam.classList.toggle('open')};document.querySelectorAll('[data-cam]').forEach(function(b){b.onclick=function(){S.cam=(S.cam+Number(b.dataset.cam)+8)%8;save()}});document.querySelectorAll('[data-set]').forEach(function(b){b.onclick=function(){S.cam=CAMS.indexOf(b.dataset.set);ui.cam.classList.remove('open');save()}});
</script>
</body>
