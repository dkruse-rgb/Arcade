<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Panel & Pages</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#0f1116}iframe{border:0;width:100%;height:100%;display:block;background:#0f1116}.loading{position:fixed;inset:0;display:grid;place-items:center;background:#0f1116;color:#f5c842;font-family:system-ui,sans-serif;z-index:2;text-align:center}.loading.hide{display:none}.err{position:fixed;inset:1rem;z-index:4;background:#111;color:#f5c842;border:1px solid #444;padding:1rem;font-family:monospace;white-space:pre-wrap;overflow:auto}
</style>
</head>
<body>
<div class="loading" id="loading"><div><h1>Loading Panel & Pages</h1><p>Customer pathing fix</p></div></div>
<iframe id="gameFrame" src="index-panel-pages-full.html?v=2"></iframe>
<script>
(function(){
  const frame=document.getElementById('gameFrame');
  const loading=document.getElementById('loading');
  function showError(err){
    const pre=document.createElement('pre');
    pre.className='err';
    pre.textContent='Patch failed:\n\n'+String(err && err.stack || err);
    document.body.appendChild(pre);
    loading.classList.add('hide');
  }
  frame.addEventListener('load',()=>{
    try{
      const w=frame.contentWindow;
      w.eval(`
(function(){
  if(window.__customer_unjam_v2)return;
  window.__customer_unjam_v2=true;

  // Remove any already-stuck shoppers from the old save state.
  if(typeof S!=='undefined' && Array.isArray(S.customers)){
    if(S.customers.length){
      S.customers=[];
      addLog('Cleared a customer traffic jam at the door.');
      save();
    }
  }

  // Shoppers no longer collide with other shoppers. They still collide with racks and shop boundaries.
  solidAt=function(x,y,ignoreCustomerId){
    if(x < .25 || y < 1.1 || x > shopW()-.25 || y > shopH()-.25) return true;
    for(const e of rackEntities()){
      if(x > e.x-.1 && x < e.x+e.w+.1 && y > e.y-.1 && y < e.y+e.h+.1) return true;
    }
    return false;
  };

  // More forgiving movement: if a shopper cannot reach a target, they repath or leave instead of freezing.
  moveActor=function(actor,dt,ignoreId){
    const dx=actor.tx-actor.x, dy=actor.ty-actor.y;
    const dist=Math.hypot(dx,dy);
    if(dist < .05){actor.stuck=0; return true;}
    const step=Math.min(dist, actor.speed*dt);
    const vx=dx/(dist||1)*step, vy=dy/(dist||1)*step;
    const oldX=actor.x, oldY=actor.y;
    const nx=actor.x+vx, ny=actor.y+vy;
    if(!solidAt(nx,actor.y,ignoreId)) actor.x=nx;
    if(!solidAt(actor.x,ny,ignoreId)) actor.y=ny;

    const moved=Math.hypot(actor.x-oldX, actor.y-oldY);
    if(moved < .003){
      actor.stuck=(actor.stuck||0)+dt;
      if(actor.stuck > 1.2){
        actor.stuck=0;
        if(actor.state==='leaving'){
          actor.x=actor.tx;
          actor.y=actor.ty;
          return true;
        }
        const spot=chooseBrowseSpot();
        actor.tx=spot.x;
        actor.ty=spot.y;
      }
    }else actor.stuck=0;

    return Math.hypot(actor.tx-actor.x, actor.ty-actor.y) < .1;
  };

  // Give the doorway a little breathing room by limiting tiny-store crowding.
  const oldUpdateCustomers=updateCustomers;
  updateCustomers=function(dt){
    oldUpdateCustomers(dt);
    if(S.customers && S.customers.length > Math.max(2, S.racks.length+1)){
      S.customers=S.customers.slice(0, Math.max(2, S.racks.length+1));
    }
  };
})();
      `);
    }catch(err){showError(err);return;}
    loading.classList.add('hide');
  });
})();
</script>
</body>
</html>
