<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Panel &amp; Pages v10</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#111;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
iframe{border:0;width:100%;height:100%;display:block;background:#111}
.loading{position:fixed;inset:0;display:grid;place-items:center;color:#f5c842;background:#111;font-family:system-ui,sans-serif;z-index:2;text-align:center}
.loading.hide{display:none}
.err{position:fixed;inset:1rem;background:#111;color:#f5c842;z-index:4;padding:1rem;font-family:ui-monospace,monospace;white-space:pre-wrap;overflow:auto;border:1px solid #444}
</style>
</head>
<body>
<div class="loading" id="loading"><div><h1>Loading Panel &amp; Pages…</h1><p>Shelf visual update + terminal removal</p></div></div>
<iframe id="gameFrame" src="panel-pages-v6.html?v=16"></iframe>
<script>
(function(){
  const frame=document.getElementById('gameFrame');
  const loading=document.getElementById('loading');

  function fail(err){
    const pre=document.createElement('pre');
    pre.className='err';
    pre.textContent='Panel & Pages v10 failed to load:\n\n'+String(err && err.stack || err);
    document.body.appendChild(pre);
    loading.classList.add('hide');
  }

  frame.addEventListener('load',()=>{
    try{
      const w=frame.contentWindow;
      const d=w.document;
      if(!w || !d) throw new Error('Could not access game frame.');
      if(w.__pp_v10_patch){ loading.classList.add('hide'); return; }
      w.__pp_v10_patch=true;

      const style=d.createElement('style');
      style.textContent='*{-webkit-user-select:none!important;user-select:none!important;-webkit-touch-callout:none!important}button,.dpad,.acts,#use,.tray,canvas{touch-action:none!important}.dpad button{font-size:0!important;position:relative}.dpad button::after{font-size:18px;line-height:1;display:block}.dpad button[data-dir="up"]::after{content:"▲"}.dpad button[data-dir="down"]::after{content:"▼"}.dpad button[data-dir="left"]::after{content:"◀"}.dpad button[data-dir="right"]::after{content:"▶"}';
      d.head.appendChild(style);

      d.addEventListener('selectstart',e=>{ if(e.target.closest && e.target.closest('.dpad,.acts,#use,.tray,button,canvas')) e.preventDefault(); }, true);
      d.addEventListener('contextmenu',e=>{ if(e.target.closest && e.target.closest('.dpad,.acts,#use,.tray,button,canvas')) e.preventDefault(); }, true);
      d.addEventListener('dragstart',e=>{ if(e.target.closest && e.target.closest('.dpad,.acts,#use,.tray,button,canvas')) e.preventDefault(); }, true);
      setInterval(()=>{ try{ w.getSelection && w.getSelection().removeAllRanges(); }catch(_){} }, 500);

      // Remove the in-world terminal now that the menu already has a Computer button.
      const originalFixedEnts=w.fixedEnts;
      w.fixedEnts=function(){
        return originalFixedEnts().filter(e=>e.kind!=='computer');
      };
      w.allEnts=function(){
        return w.fixedEnts().concat(w.rackEnts(),w.NPCS);
      };
      w.rackCollides=function(tx,ty,ww,hh,skip){
        const test={x:tx,y:ty,w:ww,h:hh};
        return w.fixedEnts().concat(
          w.S.racks.map((r,i)=> i===skip ? null : {x:r.x,y:r.y,w:w.RACKS[r.id].w,h:w.RACKS[r.id].h}).filter(Boolean)
        ).some(e=>w.overlaps(test,e));
      };
      w.canWalk=function(x,y){
        if(x<0.3||y<0.3||x>w.shopW()-0.3||y>w.shopH()-0.3) return false;
        return !w.fixedEnts().concat(w.rackEnts()).some(function(e){
          return e.solid && x>e.x-0.15 && x<e.x+(e.w||1)+0.15 && y>e.y-0.15 && y<e.y+(e.h||1)+0.15;
        });
      };

      // Rack visuals: make them read like shelves/bookcases instead of solid walls.
      w.drawRack=function(e,ghost){
        const C=w.C;
        const r=w.RACKS[e.rackId];
        const rw=e.w||1, rh=e.h||1;
        if(ghost!==undefined) C.globalAlpha=ghost;

        const palettes={
          spinner:{sideA:'#6b4423',sideB:'#503117',top:'#8b5a2b',front:'#c58a4b',accent:'#8b5cf6'},
          wall:{sideA:'#6b4423',sideB:'#503117',top:'#8b5a2b',front:'#c58a4b',accent:'#3b82f6'},
          glass:{sideA:'#5c3a1d',sideB:'#452a13',top:'#7a4e26',front:'#b67b3d',accent:'#5eead4'},
          manga:{sideA:'#70411c',sideB:'#542f13',top:'#935622',front:'#cc8a43',accent:'#ef4444'},
          long:{sideA:'#684220',sideB:'#4f3118',top:'#8c5a2f',front:'#c48a4e',accent:'#22c55e'}
        };
        const pal=palettes[e.rackId]||palettes.wall;

        // Lower profile than a wall so it reads as furniture.
        w.isoBox(e,pal.sideA,pal.sideB,pal.top,0.92);

        // Front face / bookcase lip.
        const frontTopL=w.wp(e.x,     e.y+rh, 0.78);
        const frontTopR=w.wp(e.x+rw,  e.y+rh, 0.78);
        const frontBotR=w.wp(e.x+rw,  e.y+rh, 0.10);
        const frontBotL=w.wp(e.x,     e.y+rh, 0.10);
        w.poly([frontTopL,frontTopR,frontBotR,frontBotL],pal.front,'#0005');

        // Divider posts on the front face.
        C.strokeStyle='#41220d';
        C.lineWidth=1.2;
        const dividerCount=Math.max(2,Math.round(rw*2));
        for(let i=1;i<dividerCount;i++){
          const xx=e.x+(rw/dividerCount)*i;
          const a=w.wp(xx,e.y+rh,0.12);
          const b=w.wp(xx,e.y+rh,0.80);
          C.beginPath(); C.moveTo(a.x,a.y); C.lineTo(b.x,b.y); C.stroke();
        }

        // Shelf lips.
        const levels=rh>1?[0.22,0.47,0.72]:[0.30,0.62];
        C.strokeStyle='#e0b27a';
        C.lineWidth=2;
        levels.forEach(z=>{
          const a=w.wp(e.x+0.04,e.y+rh,z);
          const b=w.wp(e.x+rw-0.04,e.y+rh,z);
          C.beginPath(); C.moveTo(a.x,a.y); C.lineTo(b.x,b.y); C.stroke();
        });

        // Add comic covers on the front so it unmistakably looks like shelving.
        const p=w.ec(e,0.82);
        const screenW=18+rw*28;
        const screenH=12+rh*16;
        const coverColors=['#ef4444','#3b82f6','#22c55e','#f59e0b','#a855f7','#06b6d4','#e11d48'];
        const shown=Math.min(w.totalFloor(),Math.max(4,Math.round(r.cap/4)));
        const rows=rh>1?3:2;
        const cols=Math.max(3,Math.round(rw*3));
        const coverW=Math.max(5,Math.floor((screenW-8)/cols)-2);
        const coverH=Math.max(10,Math.floor((screenH-3)/rows)-2);
        const startX=Math.round(p.x-screenW/2)+4;
        const startY=Math.round(p.y-screenH/2)-3;

        // Side posts drawn over the face.
        C.fillStyle='#5a3515';
        C.fillRect(startX-4,startY-4,4,screenH+10);
        C.fillRect(startX+screenW,startY-4,4,screenH+10);

        let idx=0;
        for(let row=0; row<rows; row++){
          const yy=startY+row*(coverH+4);
          C.fillStyle='#d4a16b';
          C.fillRect(startX-4,yy+coverH+1,screenW+8,3);
          for(let col=0; col<cols && idx<shown; col++){
            const xx=startX+col*(coverW+2);
            C.fillStyle=coverColors[idx%coverColors.length];
            C.fillRect(xx,yy,coverW,coverH);
            C.fillStyle='rgba(255,255,255,0.25)';
            C.fillRect(xx,yy,coverW,2);
            idx++;
          }
        }

        // Glass case gets a glass shine overlay.
        if(e.rackId==='glass'){
          C.fillStyle='rgba(180,255,255,0.18)';
          C.fillRect(startX,startY-2,screenW,screenH+4);
          C.strokeStyle='rgba(220,255,255,0.45)';
          C.lineWidth=1;
          C.strokeRect(startX,startY-2,screenW,screenH+4);
        }

        if(!w.totalFloor()){
          C.fillStyle='rgba(255,240,220,0.75)';
          C.font='bold 8px system-ui';
          C.textAlign='center';
          C.fillText('EMPTY',p.x,p.y+3);
        }

        // Small accent stripe by type.
        C.fillStyle=pal.accent;
        C.fillRect(startX,startY-6,Math.max(18,Math.floor(screenW*0.28)),3);

        C.globalAlpha=1;
      };

      // Interact no longer needs to consider a nearby computer terminal.
      w.doInteract=function(e){
        if(!e) return;
        if(e.kind==='sign'){
          w.S.shopOpen=!w.S.shopOpen;
          w.log('Shop is now '+(w.S.shopOpen?'OPEN':'CLOSED')+'.');
          w.save();
          w.customersPanel();
        }else if(e.kind==='rack'){
          w.modal('🗄 '+e.name,'<div class="card"><button onclick="stockPanel()">Stock rack</button><br><br><button onclick="startMoving('+e.rackIdx+')">Move rack</button></div>');
        }else if(e.kind==='npc'){
          w.modal('Customer','<div class="card">'+(e.spend?'Just spent '+w.money(e.spend):e.state==='leaving'?'Leaving':'Browsing')+'</div>');
        }
      };
      w.useNear=function(){
        const n=w.nearEnts().filter(e=>e.kind!=='computer');
        if(!n.length){ w.log('Nothing nearby.'); return; }
        if(n.length===1){ w.doInteract(n[0]); return; }
        w.modal('Nearby',n.map(function(e,i){ return '<button onclick="doInteract(nearEnts().filter(function(x){return x.kind!==\'computer\'})['+i+']);closeModal()">'+e.name+'</button>'; }).join(' '));
      };
      d.getElementById('use').onclick=w.useNear;

      // Redraw without the terminal or old "walk to the computer" hint.
      w.draw=function(){
        const C=w.C, G=w.G;
        C.clearRect(0,0,G.width,G.height);
        const sw=w.shopW(), sh=w.shopH();
        for(let y=-1;y<=sh+1;y++) for(let x=-1;x<=sw+1;x++){
          const inside=x>=0&&y>=0&&x<sw&&y<sh;
          w.poly(w.tcorners(x,y), inside?w.tileCol(x,y):'#0d0906', inside?'#0002':null);
        }
        const wl=w.wp(0,0,1.8), wr=w.wp(sw,0,1.8), fl=w.wp(0,0,0), fr=w.wp(sw,0,0);
        w.poly([wl,wr,fr,fl],'#1c1006','#0004');

        const doorX=Math.floor((sw-1)/2), mat=w.tcorners(doorX,1);
        w.poly(mat,'#7f1d1d','#f5c84255');
        const m=w.wp(doorX+0.5,1.5);
        C.fillStyle='#f5deb3';
        C.font='bold 7px system-ui';
        C.textAlign='center';
        C.fillText('WELCOME',m.x,m.y+2);

        const sc=w.wp(sw/2,0,2);
        C.fillStyle='#f5c842';
        C.font='bold 13px system-ui';
        C.textAlign='center';
        C.fillText('PANEL & PAGES',sc.x,sc.y);
        C.fillStyle='#888';
        C.font='8px system-ui';
        C.fillText(w.SHOP_SIZES[w.S.shopSize].name,sc.x,sc.y+13);

        w.nearEnts().filter(e=>e.kind!=='computer').forEach(function(e){
          const p=w.ec(e);
          C.strokeStyle='#f5c84266';
          C.lineWidth=1.8;
          C.beginPath();
          C.ellipse(p.x,p.y+8,22,8,0,0,7);
          C.stroke();
        });

        const list=w.allEnts().map(function(e){return{e:e,d:w.depth(e)}});
        list.push({player:true,d:w.wp(w.S.player.x,w.S.player.y).y+10});
        list.sort(function(a,b){return a.d-b.d});
        list.forEach(function(o){
          if(o.player){ w.drawPlayer(); return; }
          const e=o.e;
          if(e.kind==='sign') w.drawSign(e);
          else if(e.kind==='door') w.drawDoor(e);
          else if(e.kind==='rack') w.drawRack(e);
          else if(e.kind==='npc') w.drawNpc(e);
        });

        w.drawGhost();

        if(!w.rackCount() && !w.placing){
          const h=w.wp(sw/2,sh/2);
          C.fillStyle='#f5c842aa';
          C.font='12px system-ui';
          C.textAlign='center';
          C.fillText('Use the Computer button to order your first rack.',h.x,h.y);
          C.fillText('Then place it on the floor to start stocking comics.',h.x,h.y+16);
        }
      };

      // Freshen the help text in the log for new/empty stores.
      if(w.S.racks.length===0 && w.S.log && w.S.log.length){
        w.S.log[0]='Welcome! Use the Computer button to order a rack, then order comics and stock the floor. Customers self-checkout automatically.';
      }
      w.save();
      loading.classList.add('hide');
    }catch(err){
      fail(err);
    }
  });
})();
</script>
</body>
</html>
