*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden;background:#111;color:#eee;font-family:system-ui,sans-serif}.app{height:100dvh;display:flex;flex-direction:column}.top,.tray{background:#111;border-color:#2a2a2a;flex-shrink:0}.top{border-bottom:1px solid #2a2a2a;padding:.4rem .55rem}.row{display:flex;gap:.35rem;align-items:center;flex-wrap:wrap}.toprow{justify-content:space-between}.title{font-weight:900;color:#f5c842;font-size:clamp(1rem,4vw,1.35rem)}.pill{background:#1c1c1c;border:1px solid #333;border-radius:5px;padding:.18rem .42rem;color:#f5c842;font-weight:800;font-size:.74rem}.hi{color:#3fb950}button{border:1px solid #3a3a3a;background:#1c1c1c;color:#ddd;border-radius:6px;padding:.38rem .55rem;font:inherit;font-weight:800}button:disabled{opacity:.35}.shell{position:relative;flex:1;min-height:0}canvas{width:100%;height:100%;display:block;touch-action:none}.hud{position:absolute;top:.45rem;left:.45rem;pointer-events:none;display:flex;flex-direction:column;gap:.25rem}.hudpill{background:#111b;border:1px solid #333;border-radius:5px;padding:.18rem .42rem;color:#aaa;font-size:.72rem}.cam{position:absolute;right:.45rem;top:.45rem}.tray{border-top:1px solid #2a2a2a;padding:.35rem .45rem calc(.45rem + env(safe-area-inset-bottom))}#use{width:100%;min-height:40px;background:#f5c842;color:#111;border:0;font-size:.9rem;margin-bottom:.35rem}.grid{display:grid;grid-template-columns:auto 1fr;gap:.35rem;align-items:end}.dpad{display:grid;grid-template-columns:repeat(3,34px);gap:.18rem}.dpad span{visibility:hidden}.dpad button{height:32px;padding:0}.acts{display:grid;grid-template-columns:repeat(3,1fr);gap:.22rem}.acts button{min-height:33px;font-size:.65rem;padding:.22rem}.ov{position:fixed;inset:0;background:#0009;display:none;align-items:center;justify-content:center;z-index:10;padding:.8rem}.ov.show{display:flex}.modal{width:min(680px,98vw);max-height:90dvh;overflow:auto;background:#0d1117;border:2px solid #f5c842;box-shadow:0 0 45px #f5c84244}.mh{display:flex;justify-content:space-between;align-items:center;background:#f5c842;padding:.4rem .65rem;position:sticky;top:0}.mh h2{margin:0;color:#111;font-size:.95rem}.mh button{background:#c0392b;color:white;border:0}.mb{padding:.65rem;font-family:monospace;font-size:.82rem}.card{background:#161b22;border:1px solid #30363d;padding:.55rem;margin:.4rem 0}.card b{color:#f5c842}.sm{color:#8b949e;font-size:.78rem}.tabs{display:flex;gap:.25rem;margin-bottom:.45rem}.tabs button.on{background:#f5c842;color:#111}.place{position:absolute;top:0;left:0;right:0;background:#f5c84222;color:#f5c842;border-bottom:2px solid #f5c842;padding:.35rem;text-align:center;font-weight:900;display:none}.place.show{display:block}@media(max-width:440px){.dpad{grid-template-columns:repeat(3,31px)}.dpad button{height:30px}.acts button{font-size:.6rem}}

<body>
<div class="app">
<header class="top"><div class="row toprow"><div class="title">📚 Panel & Pages</div><button id="menu">≡</button></div><div class="row" id="stats"></div></header>
<main class="shell"><canvas id="game"></canvas><div id="hud" class="hud"></div><button class="cam" id="cam">Cam NE</button><div id="place" class="place">Tap the floor to place rack</div></main>
<nav class="tray"><button id="use">⬆ Interact</button><div class="grid"><div class="dpad"><span></span><button data-dir="up">▲</button><span></span><button data-dir="left">◀</button><button data-dir="down">▼</button><button data-dir="right">▶</button></div><div class="acts"><button id="pc">💻 Computer</button><button id="sales">💰 Sales</button><button id="stock">📦 Stock</button><button id="cust">👥 Customers</button><button id="skill">⭐ Skills</button><button id="log">📋 Log</button></div></div></nav>
</div>
<div class="ov" id="ov"><div class="modal"><div class="mh"><h2 id="mt">Panel</h2><button id="close">✕</button></div><div class="mb" id="mb"></div></div></div>
<script>
'use strict';
const $=id=>document.getElementById(id),G=$('game'),C=G.getContext('2d'),CAMS=['NE','E','SE','S','SW','W','NW','N'],SAVE='pp_v6_clean';
const RACKS={spinner:{name:'Spinner Rack',price:100,cap:12,w:1,h:1,color:'#6d28d9'},wall:{name:'Wall Display',price:160,cap:20,w:2,h:1,color:'#1e40af'},glass:{name:'Glass Case',price:240,cap:8,w:1,h:1,color:'#0f766e'},manga:{name:'Manga Shelf',price:190,cap:24,w:1,h:2,color:'#92400e'},long:{name:'Long Shelf',price:280,cap:35,w:3,h:1,color:'#365314'}};
const BOOKS={hero:{name:'Superhero Monthly',buy:3,sell:7},horror:{name:'Midnight Scream',buy:3,sell:7},scifi:{name:'Galactic Void',buy:3,sell:7},indie:{name:'Slice of Life',buy:2,sell:5},manga:{name:'Shonen Blast',buy:4,sell:9},variant:{name:'Variant Cover #1',buy:15,sell:30}};
const SIZES=[{w:10,h:8,name:'Tiny Studio',cost:0},{w:14,h:10,name:'Small Shop',cost:800},{w:18,h:13,name:'Mid-size Store',cost:2000}];
function empty(){let o={};Object.keys(BOOKS).forEach(k=>o[k]=0);return o}
function fresh(){return{cash:500,day:1,open:true,size:0,cam:0,player:{x:5,y:5},stock:empty(),floor:empty(),racks:[],sales:0,revenue:0,xp:{sales:0,stocking:0,ordering:0},log:['Welcome. Order a rack, order comics, stock the floor, then open the shop. Customers self-checkout.']}}
let S;try{S=Object.assign(fresh(),JSON.parse(localStorage.getItem(SAVE)||'{}'));S.stock=Object.assign(empty(),S.stock||{});S.floor=Object.assign(empty(),S.floor||{});S.xp=Object.assign({sales:0,stocking:0,ordering:0},S.xp||{})}catch(e){S=fresh()}
let keys={},last=performance.now(),placing=null,ghost=null,customers=[],seq=1,spawn=0,view={x:S.player.x,y:S.player.y};
const W=()=>SIZES[S.size].w,H=()=>SIZES[S.size].h,save=()=>localStorage.setItem(SAVE,JSON.stringify(S)),money=n=>'$'+Math.floor(n),total=o=>Object.values(o).reduce((a,b)=>a+(+b||0),0),cap=()=>S.racks.reduce((a,r)=>a+RACKS[r.id].cap,0),floorTotal=()=>total(S.floor),stockTotal=()=>total(S.stock),addLog=t=>{S.log=[t,...S.log].slice(0,25);save()};
function resize(){let r=G.getBoundingClientRect();G.width=Math.max(1,r.width|0);G.height=Math.max(1,r.height|0)}addEventListener('resize',resize);setTimeout(resize,50);resize();
function basis(){let l=CAMS[S.cam],d={N:[[1,0],[0,-1],0],NE:[[1,-1],[-1,-1],1],E:[[0,1],[1,0],0],SE:[[1,1],[1,-1],1],S:[[-1,0],[0,1],0],SW:[[-1,1],[1,1],1],W:[[0,-1],[-1,0],0],NW:[[-1,-1],[-1,1],1]}[l];let n=v=>{let m=Math.hypot(v[0],v[1])||1;return[v[0]/m,v[1]/m]};return{r:n(d[0]),u:n(d[1]),iso:d[2]}}
function p(x,y,z=0){let b=basis(),lx=x-view.x,ly=y-view.y,sx=lx*b.r[0]+ly*b.r[1],sy=lx*b.u[0]+ly*b.u[1];return{x:G.width/2+sx*(b.iso?27:46),y:G.height/2+16-sy*(b.iso?20:38)-z*24}}
function tile(x,y){return[p(x,y),p(x+1,y),p(x+1,y+1),p(x,y+1)]}function center(e,z=0){return p(e.x+(e.w||1)/2,e.y+(e.h||1)/2,z)}function poly(a,c,s){C.beginPath();C.moveTo(a[0].x,a[0].y);a.slice(1).forEach(q=>C.lineTo(q.x,q.y));C.closePath();C.fillStyle=c;C.fill();if(s){C.strokeStyle=s;C.stroke()}}
function toTile(sx,sy){let b=basis(),dx=sx-G.width/2,dy=sy-G.height/2-16,a=b.r[0]*(b.iso?27:46),bb=b.r[1]*(b.iso?27:46),cc=-b.u[0]*(b.iso?20:38),dd=-b.u[1]*(b.iso?20:38),det=a*dd-bb*cc;if(Math.abs(det)<.001)return null;let lx=(dx*dd-bb*dy)/det,ly=(a*dy-dx*cc)/det;return{tx:Math.floor(lx+view.x),ty:Math.floor(ly+view.y)}}
function fixed(){let dx=Math.floor((W()-1)/2);return[{id:'pc',name:'Computer',kind:'pc',x:1,y:2,w:1,h:1,solid:1},{id:'sign',name:'Open / Closed Sign',kind:'sign',x:dx+1,y:1,w:1,h:1},{id:'door',name:'Front Door',kind:'door',x:dx,y:0,w:1,h:1}]}
function rackEnts(){return S.racks.map((r,i)=>Object.assign({kind:'rack',name:RACKS[r.id].name,idx:i,w:RACKS[r.id].w,h:RACKS[r.id].h},r))}function ents(){return fixed().concat(rackEnts(),customers)}function overlap(a,b){return a.x<b.x+(b.w||1)&&a.x+(a.w||1)>b.x&&a.y<b.y+(b.h||1)&&a.y+(a.h||1)>b.y}function inShop(x,y,w=1,h=1){return x>=1&&y>=2&&x+w<=W()-1&&y+h<=H()-1}function blocked(x,y){return fixed().concat(rackEnts()).some(e=>e.solid&&x>e.x-.15&&x<e.x+(e.w||1)+.15&&y>e.y-.15&&y<e.y+(e.h||1)+.15)}function canWalk(x,y){return x>.25&&y>.25&&x<W()-.25&&y<H()-.25&&!blocked(x,y)}function placeBlocked(x,y,w,h,skip){let t={x,y,w,h};return fixed().concat(S.racks.map((r,i)=>i===skip?null:{x:r.x,y:r.y,w:RACKS[r.id].w,h:RACKS[r.id].h}).filter(Boolean)).some(e=>overlap(t,e))}
function near(){let px=S.player.x,py=S.player.y;return ents().filter(e=>{let cx=Math.max(e.x,Math.min(px,e.x+(e.w||1))),cy=Math.max(e.y,Math.min(py,e.y+(e.h||1)));return Math.hypot(px-cx,py-cy)<1.7})}
function pickBook(){let a=Object.keys(BOOKS).filter(k=>S.floor[k]>0);return a.length?a[Math.random()*a.length|0]:null}function sale(k){return BOOKS[k].sell}
function makeCustomer(){let dx=Math.floor((W()-1)/2)+.5;return{id:'c'+seq++,kind:'customer',name:'Customer',x:dx,y:.55,w:1,h:1,target:{x:dx,y:1.5},state:'enter',timer:0,browse:0,item:null,spend:0,float:0,color:['#c0392b','#2980b9','#27ae60','#8e44ad'][Math.random()*4|0],speed:1.2+Math.random()*.35}}
function spots(){let a=[];rackEnts().forEach(r=>[{x:r.x-.25,y:r.y+.5},{x:r.x+(r.w||1)+.25,y:r.y+.5},{x:r.x+.5,y:r.y+(r.h||1)+.25}].forEach(s=>{if(inShop(s.x,s.y,.1,.1))a.push(s)}));return a.length?a:[{x:W()/2,y:H()/2}]}function setT(c,t){c.target={x:t.x,y:t.y}}function exitT(){return{x:Math.floor((W()-1)/2)+.5,y:.45}}function leave(c){c.state='leave';c.exit=0;setT(c,exitT())}function move(c,dt){let dx=c.target.x-c.x,dy=c.target.y-c.y,d=Math.hypot(dx,dy);if(d<.06){c.x=c.target.x;c.y=c.target.y;return true}let st=Math.min(d,c.speed*dt);c.x+=dx/d*st;c.y+=dy/d*st;return Math.hypot(c.target.x-c.x,c.target.y-c.y)<.12}
function buy(c){let k=pickBook();if(!k){leave(c);return}let price=sale(k);S.floor[k]--;S.cash+=price;S.sales++;S.revenue+=price;S.xp.sales+=5;c.item=k;c.spend=price;c.float=2.3;addLog('Customer bought '+BOOKS[k].name+' for '+money(price)+'.');leave(c);save()}
function updateCustomers(dt){if(S.open&&floorTotal()>0&&S.racks.length){spawn+=dt;if(customers.length<Math.min(5,1+S.racks.length)&&spawn>3.6){spawn=0;customers.push(makeCustomer())}}for(let i=customers.length-1;i>=0;i--){let c=customers[i];if(c.float>0)c.float-=dt;if((!S.open||floorTotal()<=0)&&c.state!=='leave')leave(c);if(c.state==='leave'){if(c.exit){c.y-=dt*1.8;if(c.y<-.35)customers.splice(i,1);continue}if(Math.hypot(c.x-exitT().x,c.y-exitT().y)<.18){c.exit=1;continue}move(c,dt);continue}let arrived=move(c,dt);if(c.state==='enter'&&arrived){c.state='browse';c.timer=.8+Math.random();setT(c,spots()[Math.random()*spots().length|0])}else if(c.state==='browse'&&arrived){c.timer-=dt;if(c.timer<=0){if(S.open&&floorTotal()>0&&Math.random()<.72)buy(c);else if(c.browse++<3){c.timer=.7+Math.random();setT(c,spots()[Math.random()*spots().length|0])}else leave(c)}}}}
function update(dt){updateCustomers(dt);if(placing)return;let dx=0,dy=0;if(keys.up||keys.ArrowUp||keys.w)dy--;if(keys.down||keys.ArrowDown||keys.s)dy++;if(keys.left||keys.ArrowLeft||keys.a)dx--;if(keys.right||keys.ArrowRight||keys.d)dx++;if(dx||dy){let m=Math.hypot(dx,dy);dx/=m;dy/=m;let b=basis(),wx=b.r[0]*dx+b.u[0]*(-dy),wy=b.r[1]*dx+b.u[1]*(-dy),sp=3.2*dt,nx=S.player.x+wx*sp,ny=S.player.y+wy*sp;if(canWalk(nx,S.player.y))S.player.x=nx;if(canWalk(S.player.x,ny))S.player.y=ny}view.x+=(S.player.x-view.x)*dt*8;view.y+=(S.player.y-view.y)*dt*8}
function isoBox(e,col){let p0=p(e.x,e.y,1),p1=p(e.x+(e.w||1),e.y,1),p2=p(e.x+(e.w||1),e.y+(e.h||1),1),p3=p(e.x,e.y+(e.h||1),1),b2=p(e.x+(e.w||1),e.y+(e.h||1)),b3=p(e.x,e.y+(e.h||1));poly([p3,p2,b2,b3],col,'#0004');poly([p0,p1,p2,p3],col,'#fff2')}function drawObj(e){let q=center(e);if(e.kind==='pc'){isoBox(e,'#163020');C.shadowColor='#00ff88';C.shadowBlur=10;C.fillStyle='#00cc66';C.font='bold 8px monospace';C.textAlign='center';C.fillText('TERMINAL',q.x,q.y-25);C.shadowBlur=0}else if(e.kind==='sign'){C.fillStyle=S.open?'#166534':'#7f1d1d';C.fillRect(q.x-18,q.y-22,36,16);C.strokeStyle='#f5c842';C.strokeRect(q.x-18,q.y-22,36,16);C.fillStyle='#fff';C.font='bold 8px system-ui';C.textAlign='center';C.fillText(S.open?'OPEN':'CLOSED',q.x,q.y-11)}else if(e.kind==='door'){C.font='20px system-ui';C.textAlign='center';C.fillText('🚪',q.x,q.y)}else if(e.kind==='rack'){isoBox(e,RACKS[e.id].color);C.fillStyle='#aaa';C.font='8px system-ui';C.textAlign='center';C.fillText(RACKS[e.id].name.split(' ')[0],q.x,q.y+5);if(floorTotal()>0){['#c0392b','#2980b9','#27ae60','#e67e22','#8e44ad'].forEach((c,i)=>{C.fillStyle=c;C.fillRect(q.x-10+i*4,q.y-22,3,14)})}else{C.fillStyle='#666';C.fillText('EMPTY',q.x,q.y-8)}}else if(e.kind==='customer'){C.fillStyle=e.color;C.beginPath();C.roundRect(q.x-7,q.y-20,14,20,3);C.fill();C.fillStyle='#f0c080';C.beginPath();C.arc(q.x,q.y-27,7,0,7);C.fill();if(e.item){C.fillStyle='#fff8dc';C.fillRect(q.x+6,q.y-15,9,11)}if(e.spend&&e.float>0){C.fillStyle='#3fb950';C.font='bold 13px system-ui';C.textAlign='center';C.fillText('+$'+e.spend,q.x,q.y-42-(2.3-e.float)*8)}else if(e.state==='browse'){C.fillStyle='#eee';C.font='bold 10px system-ui';C.textAlign='center';C.fillText('?',q.x,q.y-38)}}}
function drawPlayer(){let q=p(S.player.x,S.player.y);C.fillStyle='#b45309';C.beginPath();C.roundRect(q.x-8,q.y-20,16,22,3);C.fill();C.fillStyle='#f5c842';C.fillRect(q.x-4,q.y-16,8,16);C.fillStyle='#f0c080';C.beginPath();C.arc(q.x,q.y-28,8,0,7);C.fill()}
function draw(){C.clearRect(0,0,G.width,G.height);for(let y=-1;y<=H()+1;y++)for(let x=-1;x<=W()+1;x++){let inside=x>=0&&y>=0&&x<W()&&y<H();poly(tile(x,y),inside?(y<2?'#1c1408':(x+y)%2?'#523414':'#43290e'):'#0d0906',inside?'#0002':null)}let dx=Math.floor((W()-1)/2);poly(tile(dx,1),'#7f1d1d','#f5c84255');let sc=p(W()/2,0,2);C.fillStyle='#f5c842';C.font='bold 13px system-ui';C.textAlign='center';C.fillText('PANEL & PAGES',sc.x,sc.y);C.fillStyle='#888';C.font='8px system-ui';C.fillText(SIZES[S.size].name,sc.x,sc.y+13);let list=ents().map(e=>({e,d:center(e).y+(e.solid?18:6)}));list.push({player:1,d:p(S.player.x,S.player.y).y+10});list.sort((a,b)=>a.d-b.d).forEach(o=>o.player?drawPlayer():drawObj(o.e));if(placing&&ghost){let r=placing.rack?RACKS[placing.rack]:RACKS[S.racks[placing.idx].id],valid=inShop(ghost.tx,ghost.ty,r.w,r.h)&&!placeBlocked(ghost.tx,ghost.ty,r.w,r.h,placing.idx);C.globalAlpha=valid?.55:.25;drawObj({kind:'rack',id:placing.rack||S.racks[placing.idx].id,x:ghost.tx,y:ghost.ty,w:r.w,h:r.h});C.globalAlpha=1}if(!S.racks.length&&!placing){let h=p(W()/2,H()/2);C.fillStyle='#f5c84288';C.font='12px system-ui';C.textAlign='center';C.fillText('Use the computer to order your first rack.',h.x,h.y)}}function render(){let fc=cap(),fl=floorTotal();$('stats').innerHTML='<span class="pill">'+money(S.cash)+'</span><span class="pill">Day '+S.day+'</span><span class="pill">'+(S.open?'OPEN':'CLOSED')+'</span><span class="pill hi">'+(fc?fl+'/'+fc+' displayed':'No racks')+'</span><span class="pill">'+SIZES[S.size].name+'</span>';$('hud').innerHTML='<div class="hudpill">'+S.racks.length+' rack'+(S.racks.length!==1?'s':'')+'</div><div class="hudpill">'+customers.length+' shopper'+(customers.length!==1?'s':'')+' in store</div>';$('cam').textContent='Cam '+CAMS[S.cam]}
function loop(t){let dt=Math.min(.05,(t-last)/1000);last=t;update(dt);draw();render();requestAnimationFrame(loop)}requestAnimationFrame(loop);
function modal(t,b){$('ov').classList.add('show');$('mt').textContent=t;$('mb').innerHTML=b}function close(){ $('ov').classList.remove('show') }$('close').onclick=close;window.closeModal=close;
function computer(tab='racks'){let tabs='<div class="tabs"><button class="'+(tab==='racks'?'on':'')+'" onclick="computer(\'racks\')">Racks</button><button class="'+(tab==='books'?'on':'')+'" onclick="computer(\'books\')">Comics</button><button class="'+(tab==='expand'?'on':'')+'" onclick="computer(\'expand\')">Expand</button></div>';let b='';if(tab==='racks')b=Object.keys(RACKS).map(k=>{let r=RACKS[k];return'<div class="card"><b>'+r.name+'</b><div class="sm">'+r.cap+' slots — '+money(r.price)+'</div><button '+(S.cash<r.price?'disabled':'')+' onclick="buyRack(\''+k+'\')">Order & Place</button></div>'}).join('');if(tab==='books')b=Object.keys(BOOKS).map(k=>{let x=BOOKS[k];return'<div class="card"><b>'+x.name+'</b><div class="sm">Buy '+money(x.buy)+' / Sell '+money(x.sell)+' | Storage '+S.stock[k]+' | Floor '+S.floor[k]+'</div><button '+(S.cash<x.buy*10?'disabled':'')+' onclick="orderBook(\''+k+'\',10)">Order 10 — '+money(x.buy*10)+'</button></div>'}).join('');if(tab==='expand')b=SIZES.map((z,i)=>'<div class="card"><b>'+z.name+(i===S.size?' — CURRENT':'')+'</b><div class="sm">'+z.w+'×'+z.h+' tiles '+(z.cost?money(z.cost):'')+'</div>'+(i===S.size+1?'<button '+(S.cash<z.cost?'disabled':'')+' onclick="expand('+i+')">Expand</button>':'')+'</div>').join('');modal('Computer',tabs+b)}window.computer=computer;
function buyRack(k){let r=RACKS[k];if(S.cash<r.price)return;S.cash-=r.price;save();placing={rack:k};$('place').classList.add('show');close()}window.buyRack=buyRack;function orderBook(k,n){let cost=BOOKS[k].buy*n;if(S.cash<cost)return;S.cash-=cost;S.stock[k]+=n;S.xp.ordering+=n;addLog('Received '+n+' × '+BOOKS[k].name+'.');save();computer('books')}window.orderBook=orderBook;function expand(i){if(S.cash<SIZES[i].cost)return;S.cash-=SIZES[i].cost;S.size=i;S.player={x:W()/2,y:H()/2};view={x:S.player.x,y:S.player.y};save();computer('expand')}window.expand=expand;
function stockPanel(){let space=cap()-floorTotal();if(!cap())return modal('Stock','<div class="card warn">No racks installed yet.</div>');modal('Stock','<div class="card"><b>Floor '+floorTotal()+'/'+cap()+'</b></div>'+Object.keys(BOOKS).map(k=>'<div class="card"><b>'+BOOKS[k].name+'</b><div class="sm">Storage '+S.stock[k]+' | Floor '+S.floor[k]+'</div><button '+(S.stock[k]&&space>0?'':'disabled')+' onclick="put(\''+k+'\',1)">Put 1</button> <button '+(S.stock[k]&&space>0?'':'disabled')+' onclick="put(\''+k+'\',5)">Put 5</button></div>').join(''))}function put(k,n){let q=Math.min(n,S.stock[k],cap()-floorTotal());S.stock[k]-=q;S.floor[k]+=q;S.xp.stocking+=q;save();stockPanel()}window.put=put;
function salesPanel(){modal('Sales','<div class="card"><b>Today</b><div>Revenue: '+money(S.revenue)+'</div><div>Sales: '+S.sales+'</div></div>')}function customersPanel(){modal('Customers','<div class="card"><b>Status</b><div>Sign: '+(S.open?'OPEN':'CLOSED')+'</div><div>Customers inside: '+customers.length+'</div><div class="sm">Customers browse, self-checkout, flash +$ overhead, and leave.</div></div>')}function skillPanel(){modal('Skills',Object.keys(S.xp).map(k=>'<div class="card"><b>'+k+'</b> '+S.xp[k]+' XP</div>').join(''))}function logPanel(){modal('Log',S.log.map(x=>'<div class="card">'+x+'</div>').join(''))}
function interact(e){if(!e)return;if(e.kind==='pc')computer();else if(e.kind==='sign'){S.open=!S.open;addLog('Shop is now '+(S.open?'OPEN':'CLOSED')+'.');save();customersPanel()}else if(e.kind==='rack')stockPanel();else if(e.kind==='customer')modal('Customer','<div class="card">'+(e.spend?'Spent '+money(e.spend):e.state==='leave'?'Leaving':'Browsing')+'</div>')}function useNear(){let n=near();if(!n.length)return addLog('Nothing nearby.');interact(n[0])}
G.addEventListener('pointerdown',e=>{if(!placing)return;let r=G.getBoundingClientRect(),t=toTile(e.clientX-r.left,e.clientY-r.top);if(!t)return;let id=placing.rack||S.racks[placing.idx]?.id,rd=RACKS[id];if(!inShop(t.tx,t.ty,rd.w,rd.h)||placeBlocked(t.tx,t.ty,rd.w,rd.h,placing.idx)){addLog('That spot is blocked.');placing=null;ghost=null;$('place').classList.remove('show');return}if(placing.rack)S.racks.push({id,x:t.tx,y:t.ty});else{S.racks[placing.idx].x=t.tx;S.racks[placing.idx].y=t.ty}placing=null;ghost=null;$('place').classList.remove('show');save()});G.addEventListener('pointermove',e=>{if(!placing)return;let r=G.getBoundingClientRect();ghost=toTile(e.clientX-r.left,e.clientY-r.top)});
addEventListener('keydown',e=>keys[e.key]=1);addEventListener('keyup',e=>keys[e.key]=0);document.querySelectorAll('[data-dir]').forEach(b=>{let d=b.dataset.dir;b.onpointerdown=e=>{e.preventDefault();keys[d]=1};b.onpointerup=e=>{e.preventDefault();keys[d]=0};b.onpointerleave=()=>keys[d]=0;b.onpointercancel=()=>keys[d]=0});$('use').onclick=useNear;$('pc').onclick=()=>computer();$('sales').onclick=salesPanel;$('stock').onclick=stockPanel;$('cust').onclick=customersPanel;$('skill').onclick=skillPanel;$('log').onclick=logPanel;$('menu').onclick=()=>modal('Menu','<button onclick="S.day++;S.revenue=0;S.sales=0;S.open=false;customers=[];save();closeModal()">End Day</button> <button onclick="if(confirm(\'Reset?\')){localStorage.removeItem(SAVE);location.reload()}">Reset</button>');$('cam').onclick=()=>{S.cam=(S.cam+1)%CAMS.length;save()};
</script>
</body>
</html>
