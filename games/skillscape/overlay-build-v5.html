<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skillscape Overlay V5</title>
  <style>
    html,body{margin:0;height:100%;background:#020617;overflow:hidden}
    iframe{display:block;width:100%;height:100vh;border:0;background:#020617}
  </style>
</head>
<body>
  <iframe id="gameFrame" src="overlay-build-v3.html?v=sell-shop-overlay-1" title="Skillscape Overlay V5"></iframe>
  <script>
    const frame=document.getElementById('gameFrame');

    function patchHiddenButtons(d){
      if(!d.getElementById('forceHiddenButtonFix')){
        const style=d.createElement('style');
        style.id='forceHiddenButtonFix';
        style.textContent='[hidden],button[hidden],.btn[hidden],.primary[hidden]{display:none!important}.sell-divider{margin:1rem 0 .55rem;border-top:1px solid rgba(255,255,255,.14);padding-top:.8rem}.sell-note{color:#94a3b8;font-size:.9rem;margin:.25rem 0 .75rem}';
        d.head.appendChild(style);
      }

      const zone=(d.getElementById('zoneName')?.textContent||'').trim();
      const bank=d.getElementById('bankOpen');
      const shop=d.getElementById('shopOpen');

      if(bank){
        const shouldShow=zone==='Bank' && bank.hidden===false;
        bank.style.display=shouldShow?'inline-flex':'none';
      }
      if(shop){
        const shouldShow=zone==='Shop' && shop.hidden===false;
        shop.style.display=shouldShow?'inline-flex':'none';
      }
    }

    function patchShopSelling(){
      let w,d;
      try{ w=frame.contentWindow; d=frame.contentDocument; }catch(e){ return; }
      if(!w||!d||w.__skillscapeSellPatch)return;

      try{
        w.eval(`
          if(!window.__skillscapeSellPatch){
            window.__skillscapeSellPatch=true;
            const originalShopHTML=shopHTML;

            window.sellShopItem=function(itemKey){
              if(s.zone!=='Shop'||!nearKind('shop')){
                addLog('Enter the shop and stand by the counter first.');
                render();
                return;
              }
              const qty=s.inv[itemKey]||0;
              if(qty<=0){
                addLog('No '+nice(itemKey)+' to sell.');
                openPanel('shop');
                return;
              }
              const gain=qty*(prices[itemKey]||0);
              s.inv[itemKey]=0;
              s.gold+=gain;
              addLog('Sold '+qty+' '+nice(itemKey)+' for '+gain+' gold.');
              save();
              openPanel('shop');
            };

            window.sellShopAll=function(){
              if(s.zone!=='Shop'||!nearKind('shop')){
                addLog('Enter the shop and stand by the counter first.');
                render();
                return;
              }
              let sold=0,gain=0;
              ITEMS.forEach(k=>{
                const qty=s.inv[k]||0;
                if(qty>0){
                  sold+=qty;
                  gain+=qty*(prices[k]||0);
                  s.inv[k]=0;
                }
              });
              if(!sold){
                addLog('Nothing to sell.');
              }else{
                s.gold+=gain;
                addLog('Sold '+sold+' items for '+gain+' gold.');
                save();
              }
              openPanel('shop');
            };

            shopHTML=function(){
              const buying=originalShopHTML();
              const sellRows=ITEMS.map(k=>{
                const qty=s.inv[k]||0;
                const value=qty*(prices[k]||0);
                return '<div class="shopRow"><div><b>'+nice(k)+'</b><p class="muted">Qty '+qty+' • '+(prices[k]||0)+'g each • '+value+'g total</p></div><button class="btn" '+(qty<=0?'disabled':'')+' onclick="sellShopItem(\\''+k+'\\')">Sell</button></div>';
              }).join('');
              return buying+'<div class="sell-divider"><h3>Sell Items</h3><p class="sell-note">Sell your carried items for gold. Banked items stay safe.</p><div class="nav"><button class="primary" onclick="sellShopAll()">Sell all inventory</button></div>'+sellRows+'</div>';
            };
          }
        `);
      }catch(e){
        console.warn('Shop sell patch failed',e);
      }
    }

    function patch(){
      let d;
      try{ d=frame.contentDocument; }catch(e){ return; }
      if(!d) return;
      patchHiddenButtons(d);
      patchShopSelling();
    }

    frame.addEventListener('load',()=>{
      patch();
      let ticks=0;
      const t=setInterval(()=>{
        patch();
        ticks++;
        if(ticks>30) clearInterval(t);
      },250);
    });

    setInterval(patch,750);
  </script>
</body>
</html>
