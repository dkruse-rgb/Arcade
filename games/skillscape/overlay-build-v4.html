<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skillscape Overlay V4</title>
  <style>
    html,body{margin:0;height:100%;background:#020617;overflow:hidden}
    iframe{display:block;width:100%;height:100vh;border:0;background:#020617}
  </style>
</head>
<body>
  <iframe id="gameFrame" src="overlay-build-v3.html?v=hidden-button-fix-1" title="Skillscape Overlay V4"></iframe>
  <script>
    const frame=document.getElementById('gameFrame');

    function patch(){
      let d;
      try{ d=frame.contentDocument; }catch(e){ return; }
      if(!d) return;

      if(!d.getElementById('forceHiddenButtonFix')){
        const style=d.createElement('style');
        style.id='forceHiddenButtonFix';
        style.textContent='[hidden],button[hidden],.btn[hidden],.primary[hidden]{display:none!important}';
        d.head.appendChild(style);
      }

      const zone=(d.getElementById('zoneName')?.textContent||'').trim();
      const bank=d.getElementById('bankOpen');
      const shop=d.getElementById('shopOpen');

      if(bank){
        const shouldShow=zone==='Bank' && bank.hidden===false;
        bank.style.display=shouldShow?'inline-flex':'none';
      }
      if(shop){
        const shouldShow=zone==='Shop' && shop.hidden===false;
        shop.style.display=shouldShow?'inline-flex':'none';
      }
    }

    frame.addEventListener('load',()=>{
      patch();
      let ticks=0;
      const t=setInterval(()=>{
        patch();
        ticks++;
        if(ticks>30) clearInterval(t);
      },250);
    });

    setInterval(patch,750);
  </script>
</body>
</html>
