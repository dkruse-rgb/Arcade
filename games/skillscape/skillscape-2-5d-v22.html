<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Skillscape 2.5D Prototype V22</title>
  <style>
    html,body{margin:0;min-height:100%;background:#020617;overflow:auto}
    iframe{display:block;width:100%;height:100dvh;min-height:100svh;border:0;background:#020617}
  </style>
</head>
<body>
  <iframe id="v22Frame" src="skillscape-2-5d-v21.html?v=performance-pass-v22" title="Skillscape 2.5D Prototype V22"></iframe>
  <script>
    const v22Frame = document.getElementById('v22Frame');

    function findGame(doc, depth = 0) {
      if (!doc || depth > 36) return null;
      try {
        if (doc.getElementById('game') && doc.defaultView) return { doc, win: doc.defaultView };
        for (const f of [...doc.querySelectorAll('iframe')]) {
          const hit = findGame(f.contentDocument, depth + 1);
          if (hit) return hit;
        }
      } catch (e) {
        return null;
      }
      return null;
    }

    function patch() {
      let hit;
      try { hit = findGame(v22Frame.contentDocument); } catch (e) { return; }
      if (!hit) return;
      const w = hit.win;

      try {
        w.eval(`
          if (!window.__v22PerformancePass) {
            window.__v22PerformancePass = true;

            const perfState = {
              fpsCap: 30,
              lastDrawAt: 0,
              lastSig: '',
              lastDrawDuration: 0,
              idleSkipCount: 0,
              sizeKey: '',
              canvasCache: document.createElement('canvas')
            };
            perfState.cacheCtx = perfState.canvasCache.getContext('2d');

            function perfCopyCanvas() {
              try {
                const cw = canvas.width || Math.max(1, Math.floor(canvas.clientWidth || 1));
                const ch = canvas.height || Math.max(1, Math.floor(canvas.clientHeight || 1));
                if (perfState.canvasCache.width !== cw || perfState.canvasCache.height !== ch) {
                  perfState.canvasCache.width = cw;
                  perfState.canvasCache.height = ch;
                }
                perfState.cacheCtx.clearRect(0, 0, perfState.canvasCache.width, perfState.canvasCache.height);
                perfState.cacheCtx.drawImage(canvas, 0, 0);
              } catch (e) {}
            }

            function perfBlitCache() {
              try {
                if (!perfState.canvasCache.width || !perfState.canvasCache.height) return false;
                ctx.clearRect(0, 0, canvas.clientWidth || canvas.width, canvas.clientHeight || canvas.height);
                ctx.drawImage(perfState.canvasCache, 0, 0, canvas.width || perfState.canvasCache.width, canvas.height || perfState.canvasCache.height,
                  0, 0, canvas.clientWidth || perfState.canvasCache.width, canvas.clientHeight || perfState.canvasCache.height);
                return true;
              } catch (e) {
                return false;
              }
            }

            function perfSig() {
              const s = window.state || {};
              const p = s.player || {};
              const zone = s.zone || '';
              const hp = s.hp || 0;
              const cam = s.camera || s.cameraDir || s.view || window.cameraDir || window.camDir || '';
              const modal = (window.ui && window.ui.overlay && window.ui.overlay.classList && window.ui.overlay.classList.contains('show')) ? 1 : 0;
              const nearbyCount = (typeof nearby === 'function' && nearby()) ? nearby().length : 0;
              const pw = Math.round((canvas.clientWidth || canvas.width || 0));
              const ph = Math.round((canvas.clientHeight || canvas.height || 0));
              return [zone, p.x || 0, p.y || 0, cam, hp, modal, nearbyCount, pw, ph].join('|');
            }

            function perfMaybeTuneCanvas() {
              try {
                const cssW = Math.max(1, Math.round(canvas.clientWidth || 0));
                const cssH = Math.max(1, Math.round(canvas.clientHeight || 0));
                if (!cssW || !cssH) return;
                const dpr = Math.min(window.devicePixelRatio || 1, 1.25);
                const targetW = Math.max(1, Math.round(cssW * dpr));
                const targetH = Math.max(1, Math.round(cssH * dpr));
                const key = targetW + 'x' + targetH;
                if (perfState.sizeKey !== key && Math.abs((canvas.width || 0) - targetW) > 2) {
                  canvas.width = targetW;
                  canvas.height = targetH;
                  perfState.sizeKey = key;
                  if (typeof resize === 'function') {
                    try { resize(); } catch (e) {}
                  }
                }
              } catch (e) {}
            }

            const prevDraw = window.draw;
            if (typeof prevDraw === 'function') {
              window.draw = function() {
                perfMaybeTuneCanvas();
                const now = performance.now();
                const sig = perfSig();
                const frameGap = 1000 / perfState.fpsCap;
                const unchanged = sig === perfState.lastSig;

                if (unchanged && perfState.canvasCache.width && perfState.canvasCache.height) {
                  perfState.idleSkipCount++;
                  if (perfState.idleSkipCount < 15) {
                    return perfBlitCache();
                  }
                }

                if ((now - perfState.lastDrawAt) < frameGap && perfState.canvasCache.width && perfState.canvasCache.height) {
                  return perfBlitCache();
                }

                perfState.idleSkipCount = 0;
                const started = performance.now();
                const out = prevDraw.apply(this, arguments);
                perfState.lastDrawDuration = performance.now() - started;
                perfState.lastDrawAt = now;
                perfState.lastSig = sig;
                perfCopyCanvas();
                return out;
              };
            }

            if (typeof window.render === 'function') {
              const prevRender = window.render;
              window.render = function() {
                return prevRender.apply(this, arguments);
              };
            }

            // Reduce very frequent layout reapplication work when idle.
            try {
              if (typeof window.v21ApplyLayout === 'function') {
                const rawApply = window.v21ApplyLayout;
                let lastLayoutSig = '';
                let lastLayoutAt = 0;
                window.v21ApplyLayout = function() {
                  const sig = perfSig();
                  const now = performance.now();
                  if (sig === lastLayoutSig && (now - lastLayoutAt) < 3000) return;
                  lastLayoutSig = sig;
                  lastLayoutAt = now;
                  return rawApply.apply(this, arguments);
                };
              }
            } catch (e) {}

            addLog('V22 loaded: performance pass active (30 FPS cap, cached idle frames, lighter canvas scaling).');
          }
        `);
      } catch (e) {
        console.warn('V22 performance patch failed', e);
      }
    }

    v22Frame.addEventListener('load', () => {
      patch();
      let ticks = 0;
      const t = setInterval(() => {
        patch();
        ticks++;
        if (ticks > 60) clearInterval(t);
      }, 300);
    });
    setInterval(patch, 1500);
  </script>
</body>
</html>
