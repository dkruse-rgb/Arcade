<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Skillscape Overlay V6</title>
  <style>
    html,body{margin:0;min-height:100%;background:#020617;overflow-x:hidden}
    iframe{display:block;width:100%;height:100vh;border:0;background:#020617}
  </style>
</head>
<body>
  <iframe id="gameFrame" src="overlay-build-v5.html?v=mobile-fit-1" title="Skillscape Overlay V6"></iframe>
  <script>
    const frame=document.getElementById('gameFrame');

    function patch(){
      let d,w;
      try{ d=frame.contentDocument; w=frame.contentWindow; }catch(e){ return; }
      if(!d||!w)return;

      if(!d.getElementById('mobileFitPatch')){
        const style=d.createElement('style');
        style.id='mobileFitPatch';
        style.textContent=`
          html,body{overflow-x:hidden!important;width:100%!important;max-width:100%!important}
          .wrap{width:100%!important;max-width:100%!important;padding:.65rem!important;overflow-x:hidden!important}
          .hero,.panel{max-width:100%!important;overflow:hidden!important}
          .grid{grid-template-columns:1fr!important;width:100%!important;max-width:100%!important}
          .mapShell{width:100%!important;max-width:100%!important;overflow:hidden!important;padding:.38rem!important}
          .map{min-width:0!important;width:100%!important;max-width:100%!important;gap:2px!important}
          .tile{min-width:0!important;min-height:0!important;width:auto!important;aspect-ratio:1/1!important;border-radius:7px!important;font-size:clamp(.72rem,3.1vw,1rem)!important}
          .spot{width:clamp(17px,5.3vw,23px)!important;height:clamp(17px,5.3vw,23px)!important;font-size:clamp(.7rem,3vw,.92rem)!important;right:1px!important;bottom:1px!important;border-radius:6px!important}
          .player{font-size:clamp(.72rem,3.2vw,1rem)!important}
          .nav{gap:.38rem!important}
          .nav .btn,.nav .primary,.nav a{padding:.55rem .68rem!important;font-size:clamp(.8rem,3.6vw,.95rem)!important;white-space:nowrap!important}
          .padWrap{gap:.55rem!important;margin:.55rem auto!important}
          .pad{grid-template-columns:repeat(3,38px)!important;gap:.3rem!important}
          .pad button{min-height:36px!important;border-radius:11px!important}
          #useBtn{padding:.68rem .85rem!important;font-size:clamp(.88rem,4vw,1rem)!important}
          .dialog{font-size:.92rem!important;line-height:1.35!important;white-space:normal!important;overflow-wrap:anywhere!important}
          .chips{overflow:hidden!important}.chip{max-width:100%;white-space:normal!important}
          .stats{grid-template-columns:repeat(2,1fr)!important;min-width:0!important;width:100%!important}
          h1{font-size:clamp(2rem,11vw,3.5rem)!important}
          .tag{font-size:.95rem!important}
          .cards,.mini{grid-template-columns:1fr!important}
          [hidden],button[hidden],.btn[hidden],.primary[hidden]{display:none!important}
          @media(max-width:420px){
            .wrap{padding:.5rem!important}
            .hero,.panel{border-radius:20px!important;padding:.75rem!important}
            .mapShell{padding:.28rem!important}
            .map{gap:2px!important}
            .tile{border-radius:6px!important}
            .nav .btn,.nav .primary,.nav a{padding:.5rem .58rem!important}
            .pad{grid-template-columns:repeat(3,36px)!important}
            .pad button{min-height:34px!important}
          }
        `;
        d.head.appendChild(style);
      }

      try{
        w.eval(`
          if(!window.__mobileFitPatch){
            window.__mobileFitPatch=true;
            const oldRenderMap=renderMap;
            renderMap=function(){
              oldRenderMap();
              const mapEl=document.getElementById('map');
              if(mapEl){
                mapEl.style.minWidth='0px';
                mapEl.style.width='100%';
                const z=zones[s.zone];
                if(z&&z.m&&z.m[0]){
                  mapEl.style.gridTemplateColumns='repeat('+z.m[0].length+', minmax(0, 1fr))';
                }
              }
            };
            render();
          }
        `);
      }catch(e){}

      const map=d.getElementById('map');
      const zone=(d.getElementById('zoneName')?.textContent||'Village').trim();
      try{
        const zonesObj=w.zones;
        const state=w.s;
        const z=zonesObj && state ? zonesObj[state.zone] : null;
        if(map&&z&&z.m&&z.m[0]){
          map.style.minWidth='0px';
          map.style.width='100%';
          map.style.gridTemplateColumns='repeat('+z.m[0].length+', minmax(0, 1fr))';
        }
      }catch(e){
        if(map){map.style.minWidth='0px';map.style.width='100%';}
      }
    }

    frame.addEventListener('load',()=>{
      patch();
      let ticks=0;
      const t=setInterval(()=>{
        patch();
        ticks++;
        if(ticks>40) clearInterval(t);
      },250);
    });

    setInterval(patch,800);
  </script>
</body>
</html>
