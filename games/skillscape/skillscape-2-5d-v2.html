<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Skillscape 2.5D Prototype V2</title>
  <style>
    html,body{margin:0;min-height:100%;background:#020617;overflow:hidden}
    iframe{display:block;width:100%;height:100vh;border:0;background:#020617}
  </style>
</head>
<body>
  <iframe id="gameFrame" src="skillscape-2-5d.html?v=movement-fix-1" title="Skillscape 2.5D Prototype V2"></iframe>
  <script>
    const frame=document.getElementById('gameFrame');

    function patch(){
      let d,w;
      try{ d=frame.contentDocument; w=frame.contentWindow; }catch(e){ return; }
      if(!d||!w)return;

      if(!d.getElementById('movementFixStyle')){
        const style=d.createElement('style');
        style.id='movementFixStyle';
        style.textContent=`
          .pad button{touch-action:none!important;user-select:none!important;-webkit-user-select:none!important}
          .actionCluster button{touch-action:manipulation!important}
        `;
        d.head.appendChild(style);
      }

      try{
        w.eval(`
          if(!window.__movementFixV2){
            window.__movementFixV2=true;
            const SAFE_SPAWN={x:10.2,y:12.2};

            function isBlockedNow(x,y){
              return !canMove(x,y);
            }

            window.unstickPlayer=function(reason='Moved to safe spawn.'){
              state.player={x:SAFE_SPAWN.x,y:SAFE_SPAWN.y};
              keys.ArrowUp=false;keys.ArrowDown=false;keys.ArrowLeft=false;keys.ArrowRight=false;
              keys.w=false;keys.a=false;keys.s=false;keys.d=false;
              localStorage.setItem(SAVE,JSON.stringify(state));
              addLog(reason);
              renderHUD();
            };

            if(isBlockedNow(state.player.x,state.player.y)){
              unstickPlayer('You spawned inside collision, so V2 moved you to a safe spot.');
            }

            const oldUpdate=update;
            update=function(dt){
              if(isBlockedNow(state.player.x,state.player.y)){
                unstickPlayer('Unstuck: collision trap detected.');
                return;
              }
              oldUpdate(dt);
            };

            window.tapMove=function(dir){
              const map={up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight'};
              const k=map[dir];
              if(!k)return;
              keys[k]=true;
              for(let i=0;i<12;i++) update(1/60);
              keys[k]=false;
              renderHUD(false);
            };

            document.querySelectorAll('[data-dir]').forEach(btn=>{
              if(btn.__tapMoveBound)return;
              btn.__tapMoveBound=true;
              const dir=btn.dataset.dir;
              btn.addEventListener('touchstart',e=>{e.preventDefault(); const map={up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight'}; keys[map[dir]]=true;},{passive:false});
              btn.addEventListener('touchend',e=>{e.preventDefault(); const map={up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight'}; keys[map[dir]]=false; tapMove(dir);},{passive:false});
              btn.addEventListener('click',e=>{e.preventDefault(); tapMove(dir);});
            });

            const oldReset=reset;
            reset=function(){
              if(confirm('Reset 2.5D prototype V2?')){
                localStorage.removeItem(SAVE);
                state.gold=60;state.hp=30;state.maxHp=30;state.bag=0;state.bagMax=20;
                state.player={x:SAFE_SPAWN.x,y:SAFE_SPAWN.y};
                state.log=['2.5D V2 loaded at a safe spawn point.'];
                localStorage.setItem(SAVE,JSON.stringify(state));
                location.reload();
              }
            };
            const resetBtn=document.getElementById('resetBtn');
            if(resetBtn)resetBtn.onclick=reset;

            addLog('V2 movement patch loaded: safe spawn + tap-to-move controls.');
          }
        `);
      }catch(e){
        console.warn('2.5D V2 movement patch failed',e);
      }
    }

    frame.addEventListener('load',()=>{
      patch();
      let ticks=0;
      const t=setInterval(()=>{
        patch();
        ticks++;
        if(ticks>40)clearInterval(t);
      },250);
    });
    setInterval(patch,1000);
  </script>
</body>
</html>
