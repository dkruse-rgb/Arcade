<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Skillscape 2.5D Prototype V17</title>
  <style>
    html,body{margin:0;min-height:100%;background:#020617;overflow:auto}
    iframe{display:block;width:100%;height:100dvh;min-height:100svh;border:0;background:#020617}
  </style>
</head>
<body>
  <iframe id="v17Frame" src="skillscape-2-5d-v16.html?v=camera-aware-art-1" title="Skillscape 2.5D Prototype V17"></iframe>
  <script>
    const v17Frame=document.getElementById('v17Frame');

    function findGame(doc,depth=0){
      if(!doc||depth>28)return null;
      try{
        if(doc.getElementById('game')&&doc.defaultView)return {doc,win:doc.defaultView};
        for(const f of [...doc.querySelectorAll('iframe')]){
          const hit=findGame(f.contentDocument,depth+1);
          if(hit)return hit;
        }
      }catch(e){return null;}
      return null;
    }

    function patch(){
      let hit;
      try{ hit=findGame(v17Frame.contentDocument); }catch(e){ return; }
      if(!hit)return;
      const d=hit.doc,w=hit.win;

      try{
        w.eval(`
          if(!window.__v17CameraAwareArt){
            window.__v17CameraAwareArt=true;

            function v17Poly(points,fill,stroke='rgba(255,255,255,.13)',lw=1){
              ctx.beginPath();
              ctx.moveTo(points[0].x,points[0].y);
              for(let i=1;i<points.length;i++)ctx.lineTo(points[i].x,points[i].y);
              ctx.closePath();
              ctx.fillStyle=fill;ctx.fill();
              if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
            }
            function v17Ellipse(cx,cy,rx,ry,fill,stroke=null,lw=1){
              ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fillStyle=fill;ctx.fill();
              if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
            }
            function v17RoundRect(x,y,w,h,r,fill,stroke=null){
              ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fillStyle=fill;ctx.fill();
              if(stroke){ctx.strokeStyle=stroke;ctx.stroke();}
            }
            function v17Dark(hex,amt=.25){
              const n=parseInt(hex.slice(1),16),r=(n>>16)&255,g=(n>>8)&255,b=n&255;
              const nr=Math.max(0,Math.floor(r*(1-amt))),ng=Math.max(0,Math.floor(g*(1-amt))),nb=Math.max(0,Math.floor(b*(1-amt)));
              return '#'+((1<<24)+(nr<<16)+(ng<<8)+nb).toString(16).slice(1);
            }
            function v17Light(hex,amt=.16){
              const n=parseInt(hex.slice(1),16),r=(n>>16)&255,g=(n>>8)&255,b=n&255;
              const nr=Math.min(255,Math.floor(r+(255-r)*amt)),ng=Math.min(255,Math.floor(g+(255-g)*amt)),nb=Math.min(255,Math.floor(b+(255-b)*amt));
              return '#'+((1<<24)+(nr<<16)+(ng<<8)+nb).toString(16).slice(1);
            }
            function v17Corners(e,z=0,pad=0){
              const x=e.x-pad,y=e.y-pad,w=(e.w||1)+pad*2,h=(e.h||1)+pad*2;
              return {
                nw:screen(x,y,z),
                ne:screen(x+w,y,z),
                se:screen(x+w,y+h,z),
                sw:screen(x,y+h,z),
                c:screen(x+w/2,y+h/2,z)
              };
            }
            function v17Avg(points){
              return points.reduce((a,p)=>({x:a.x+p.x/points.length,y:a.y+p.y/points.length}),{x:0,y:0});
            }
            function v17Badge(icon,x,y,size=34){
              v17RoundRect(x-size/2,y-size/2,size,size,10,'rgba(2,6,23,.78)','rgba(255,255,255,.14)');
              ctx.font=Math.floor(size*.58)+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(icon,x,y+1);
            }
            function v17Shadow(e){
              const c=v17Corners(e,0).c;
              v17Ellipse(c.x,c.y+10,Math.max(20,(e.w+e.h)*14),Math.max(7,(e.w+e.h)*5),'rgba(0,0,0,.28)');
              return c;
            }

            function v17DrawCameraBuilding(e){
              v17Shadow(e);
              let roof='#c2410c',wall='#d6b58a',icon=e.icon||'🏠';
              if(e.id==='bank'){roof='#2563eb';wall='#dbeafe';icon='🏦'}
              if(e.id==='shop'){roof='#d97706';wall='#fde68a';icon='🏪'}
              if(e.id==='smithy'||e.id==='hillFurnace'){roof='#475569';wall='#94a3b8';icon=e.id==='hillFurnace'?'🔥':'⚒️'}
              if(e.id==='inn'){roof='#c2410c';wall='#fed7aa';icon='🛏️'}

              const z=e.z||1.5;
              const b=v17Corners(e,0);
              const t=v17Corners(e,z*.72);
              const r=v17Corners(e,z*.98,.18);

              // side walls from true world corners, so straight camera angles behave.
              const faces=[
                {pts:[b.nw,b.ne,t.ne,t.nw],col:v17Light(wall,.05)},
                {pts:[b.ne,b.se,t.se,t.ne],col:v17Dark(wall,.25)},
                {pts:[b.se,b.sw,t.sw,t.se],col:v17Dark(wall,.16)},
                {pts:[b.sw,b.nw,t.nw,t.sw],col:v17Dark(wall,.08)}
              ];
              // draw lower/back faces first
              faces.sort((a,b)=>v17Avg(a.pts).y-v17Avg(b.pts).y).forEach(f=>v17Poly(f.pts,f.col,'rgba(255,255,255,.10)'));

              // roof as an expanded world-corner cap, not fixed screen diamond.
              v17Poly([r.nw,r.ne,r.se,r.sw],roof,'rgba(255,255,255,.18)',1.4);
              v17Poly([r.ne,r.se,r.c],v17Dark(roof,.14),null);
              v17Poly([r.sw,r.nw,r.c],v17Light(roof,.08),null);

              // door on front-most wall, anchored near entity center bottom.
              const front=[b.nw,b.ne,b.se,b.sw].sort((a,b)=>b.y-a.y).slice(0,2);
              const dc={x:(front[0].x+front[1].x)/2,y:(front[0].y+front[1].y)/2};
              v17RoundRect(dc.x-11,dc.y-34,22,32,5,'#3f1f12','rgba(255,255,255,.15)');
              ctx.fillStyle='rgba(251,191,36,.85)';ctx.beginPath();ctx.arc(dc.x+6,dc.y-17,2.2,0,Math.PI*2);ctx.fill();

              const rc=v17Corners(e,z*1.15,.18).c;
              v17Badge(icon,rc.x,rc.y-8,36);
            }

            function v17DrawCameraTree(e){
              const c=v17Shadow(e);const s=e.id==='tree2'?1.12:1;
              const top=screen(e.x+(e.w||1)/2,e.y+(e.h||1)/2,(e.z||1.7));
              const trunkBase=screen(e.x+(e.w||1)/2,e.y+(e.h||1)/2,.18);
              ctx.strokeStyle='#7c2d12';ctx.lineWidth=10*s;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(trunkBase.x,trunkBase.y);ctx.lineTo(top.x,top.y+24*s);ctx.stroke();
              v17Ellipse(top.x,top.y-2,30*s,22*s,'#166534','rgba(255,255,255,.13)');
              v17Ellipse(top.x-18*s,top.y+8*s,21*s,17*s,'#15803d');
              v17Ellipse(top.x+17*s,top.y+8*s,21*s,17*s,'#14532d');
              v17Ellipse(top.x,top.y+16*s,25*s,18*s,'#16a34a');
              v17Badge(e.id==='tree2'?'🌳':'🌲',top.x,top.y+4,32);
            }

            function v17DrawCameraRock(e,kind='iron'){
              v17Shadow(e);
              const c=v17Corners(e,.38).c;
              const base=kind==='copper'?'#b45309':'#475569';const hi=kind==='copper'?'#f59e0b':'#cbd5e1';
              const pts=[
                {x:c.x-30,y:c.y+8},{x:c.x-14,y:c.y-18},{x:c.x+18,y:c.y-22},{x:c.x+34,y:c.y-2},{x:c.x+14,y:c.y+18},{x:c.x-20,y:c.y+17}
              ];
              v17Poly(pts,base,'rgba(255,255,255,.16)',1.2);
              v17Poly([pts[1],{x:c.x+2,y:c.y-5},pts[2]],v17Light(base,.18),null);
              v17Poly([pts[5],{x:c.x+2,y:c.y-5},pts[4]],v17Dark(base,.2),null);
              ctx.strokeStyle=hi;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(c.x-13,c.y-2);ctx.lineTo(c.x-3,c.y-11);ctx.moveTo(c.x+7,c.y+4);ctx.lineTo(c.x+18,c.y-5);ctx.stroke();
              v17Badge('⛏️',c.x,c.y-37,32);
            }

            function v17DrawCameraWaterSpot(e){
              const b=v17Corners(e,0,.08);v17Poly([b.nw,b.ne,b.se,b.sw],'#075985','rgba(125,211,252,.28)');
              const c=b.c;ctx.strokeStyle='rgba(186,230,253,.6)';ctx.lineWidth=2;
              for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(c.x-26,c.y+i*9);ctx.quadraticCurveTo(c.x,c.y-7+i*9,c.x+26,c.y+i*9);ctx.stroke();}
              v17Badge('🎣',c.x+3,c.y-24,34);
            }

            function v17DrawTravel(e){
              const c=v17Shadow(e);const top=screen(e.x+(e.w||1)/2,e.y+(e.h||1)/2,.35);
              v17Ellipse(top.x,top.y,28,12,'rgba(91,33,182,.75)','rgba(216,180,254,.55)',2);
              ctx.strokeStyle='rgba(216,180,254,.75)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(top.x,top.y-16,18,Math.PI*.15,Math.PI*1.85);ctx.stroke();
              v17Badge(e.targetZone==='Village'?'🏡':'⛰️',top.x,top.y-17,34);
            }

            const prevDrawBlock=drawBlock;
            window.drawBlock=function(e){
              if(!e)return;
              if(e.id==='pond')return v17DrawCameraWaterSpot(e);
              if(e.kind==='travel')return v17DrawTravel(e);
              if(e.id&&/tree/i.test(e.id))return v17DrawCameraTree(e);
              if(e.name&&/Copper rock/i.test(e.name))return v17DrawCameraRock(e,'copper');
              if(e.name&&/Iron rock/i.test(e.name))return v17DrawCameraRock(e,'iron');
              if(e.kind==='door')return v17DrawCameraBuilding(e);
              return prevDrawBlock(e);
            };

            addLog('V17 loaded: buildings/props now use camera-aware world-corner rendering.');
          }
        `);
      }catch(e){console.warn('V17 camera-aware art patch failed',e);}
    }

    v17Frame.addEventListener('load',()=>{
      patch();
      let ticks=0;
      const t=setInterval(()=>{patch();ticks++;if(ticks>190)clearInterval(t)},250);
    });
    setInterval(patch,1000);
  </script>
</body>
</html>
