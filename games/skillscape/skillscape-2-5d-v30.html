ound:#0008;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,#38bdf8,#22c55e,#fbbf24)}.tray{position:sticky;bottom:0;z-index:6;background:linear-gradient(#020617cc,#020617fa);border-top:1px solid #ffffff14;padding:.5rem .55rem calc(.65rem + env(safe-area-inset-bottom));backdrop-filter:blur(8px)}#use{width:100%;min-height:44px;background:linear-gradient(90deg,#38bdf8,#22c55e);color:#02111f}.trayGrid{display:grid;grid-template-columns:auto 1fr;gap:.45rem;margin-top:.4rem;align-items:end}.dpad{display:grid;grid-template-columns:repeat(3,38px);gap:.24rem}.dpad span{visibility:hidden}.dpad button{height:36px;border-radius:12px;touch-action:none}.actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:.28rem}.actions button{min-height:36px;font-size:.72rem;padding:.32rem .14rem}.overlay{position:fixed;inset:0;background:#020617bb;z-index:20;display:none;align-items:center;justify-content:center;padding:1rem}.overlay.show{display:flex}.modal{width:min(760px,96vw);max-height:86dvh;overflow:auto;background:#0f172af5;border:1px solid #ffffff24;border-radius:22px;padding:1rem;box-shadow:0 25px 80px #0009}.modalHead{display:flex;justify-content:space-between;gap:.5rem}.modal h2{margin:.1rem 0}.hint,.small{color:#94a3b8;font-size:.85rem}.card{background:#1e293bcc;border:1px solid #ffffff1f;border-radius:16px;padding:.75rem;margin:.5rem 0}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.5rem}.ready{border-color:#22c55e99!important}button:disabled{opacity:.45}.ownedTag{display:inline-block;margin-left:.35rem;padding:.1rem .42rem;border-radius:999px;background:#22c55e2e;border:1px solid #22c55e77;color:#bbf7d0;font-size:.72rem;font-weight:900}@media(max-width:520px){.shell{padding:.32rem}.wrap{height:calc(100dvh - 205px);min-height:325px}.grid{grid-template-columns:1fr}.dpad{grid-template-columns:repeat(3,35px)}.dpad button{height:34px}.actions button{font-size:.67rem}.hud .pill:nth-child(3){display:none}}

<body>
<div class='app'><header class='top'><div class='row topline'><div class='title'>Skillscape 2.5D</div><button id='menu'>☰ Menu</button></div><div class='row' id='stats'></div></header><main class='shell'><div class='wrap'><canvas id='game'></canvas><div class='hud' id='hud'></div><div class='cam' id='camBox'><button id='camBtn'>🎥 Camera NE</button><div class='camMenu'><button data-cam='-1'>↶</button><button data-cam='1'>↷</button><button data-set='NE'>NE</button><button data-set='E'>E</button><button data-set='SE'>SE</button><button data-set='S'>S</button><button data-set='SW'>SW</button><button data-set='W'>W</button><button data-set='NW'>NW</button><button data-set='N'>N</button></div></div><div class='prog' id='prog'><b id='progTxt'>Working...</b><div class='barBox'><div class='bar' id='bar'></div></div></div></div></main><nav class='tray'><button id='use'>Use Nearby</button><div class='trayGrid'><div class='dpad'><span></span><button data-dir='up'>▲</button><span></span><button data-dir='left'>◀</button><button data-dir='down'>▼</button><button data-dir='right'>▶</button></div><div class='actions'><button id='bag'>🎒 Bag</button><button id='skills'>⚡ Skills</button><button id='gear'>🛡️ Gear</button><button id='quests'>📜 Quests</button><button id='bank'>🏦 Bank</button><button id='shop'>🏪 Shop</button></div></div></nav></div><div class='overlay' id='overlay'><div class='modal'><div class='modalHead'><div><h2 id='mt'>Panel</h2><div class='hint' id='mh'></div></div><button id='x'>✕</button></div><div id='mb'></div></div></div>
<script>
const c=document.getElementById('game'),ctx=c.getContext('2d'),$=id=>document.getElementById(id);
const ui={stats:$('stats'),hud:$('hud'),o:$('overlay'),mt:$('mt'),mh:$('mh'),mb:$('mb'),prog:$('prog'),pt:$('progTxt'),bar:$('bar'),cam:$('camBox'),camBtn:$('camBtn')};
const SAVE='skillscape_25d_v30',CAMS=['NE','E','SE','S','SW','W','NW','N'];
const ITEMS={logs:'Logs',copperOre:'Copper Ore',ironOre:'Iron Ore',rawFish:'Raw Fish',cookedFish:'Cooked Fish',bones:'Bones',goblinEars:'Goblin Ears'},PRICE={logs:2,copperOre:3,ironOre:8,rawFish:3,cookedFish:6,bones:2,goblinEars:10};
const GEAR={fists:{name:'Bare Hands',slot:'weapon',atk:1,def:0},rustySword:{name:'Rusty Sword',slot:'weapon',atk:3,def:0},woodShield:{name:'Wood Shield',slot:'shield',atk:0,def:2},bronzeSword:{name:'Bronze Sword',slot:'weapon',atk:6,def:0}};
const SHOP=[['Bronze Axe','tool','axe',2,60],['Bronze Pickaxe','tool','pickaxe',2,60],['Better Rod','tool','rod',2,55],['Rusty Sword','gear','rustySword',0,50],['Wood Shield','gear','woodShield',0,55],['Bronze Sword','gear','bronzeSword',0,140],['Backpack +10','bag','bag',10,250]];
const QUESTS={lumber:{npc:'Forester Finn',need:{logs:10},reward:{gold:45,xp:{woodcutting:30}},text:'Bring 10 Logs.'},copper:{npc:'Miner Mags',need:{copperOre:12},reward:{gold:60,xp:{mining:35}},text:'Bring 12 Copper Ore.'},fish:{npc:'Cook Pete',need:{cookedFish:5},reward:{gold:75,xp:{cooking:35}},text:'Bring 5 Cooked Fish.'},guard:{npc:'Guard Bria',need:{bones:5},reward:{gold:90,xp:{combat:45}},text:'Bring 5 Bones.'}};

function empty(){return Object.fromEntries(Object.keys(ITEMS).map(k=>[k,0]))}
function def(){return{zone:'Village',player:{x:8,y:8},camera:0,gold:60,hp:30,maxHp:30,bagMax:20,inv:empty(),bank:empty(),skills:{woodcutting:0,mining:0,fishing:0,cooking:0,combat:0,smithing:0},tools:{axe:1,pickaxe:1,rod:1},owned:['fists'],eq:{weapon:'fists',shield:null},quests:{lumber:'not_started',copper:'not_started',fish:'not_started',guard:'not_started'},log:['V30 loaded — corrected directional player facing, NPC bodies, and tool fixes!']}}
function merge(a,b){for(const k in b){if(b[k]&&typeof b[k]=='object'&&!Array.isArray(b[k])&&a[k])merge(a[k],b[k]);else a[k]=b[k]}return a}
let state;try{state=merge(def(),JSON.parse(localStorage.getItem(SAVE)||'{}'))}catch(e){state=def()}

let keys={},job=null,last=performance.now(),world={w:20,h:16},tw=64,th=34;

// ── PLAYER ANIMATION STATE ──────────────────────────────────────────────────
const anim={
  walkTime:0,       // accumulated walk cycle timer
  isMoving:false,
  facingDir:'SE',   // NE E SE S SW W NW N
  viewDir:'down',   // screen-facing pose: up/down/left/right
  actionTimer:0,    // for tool-use bobbing
  isActing:false,
  bobPhase:0,
  stepPhase:0,      // 0..1 walk cycle
  // smooth position (visual only, separate from state.player)
  vx:8, vy:8,
  // step trail for footprints
  footprints:[],
  lastFootAt:0,
};

// Facing directions mapped to isometric look
const FACE_TO_ISO={
  'NE':'right','E':'right','SE':'right',
  'S':'down','SW':'left','W':'left',
  'NW':'left','N':'up'
};

function save(){localStorage.setItem(SAVE,JSON.stringify(state))}
function log(t){state.log=[t,...state.log].slice(0,14);save()}
function used(){return Object.values(state.inv).reduce((a,b)=>a+(+b||0),0)}
function free(){return state.bagMax-used()}
function lvl(x){let l=1;while(x>=Math.floor(50*Math.pow(l+1,1.55)))l++;return l}
function gain(s,x){state.skills[s]=(state.skills[s]||0)+x}
function has(r){return Object.entries(r).every(([k,v])=>(state.inv[k]||0)>=v)}
function take(r){Object.entries(r).forEach(([k,v])=>state.inv[k]-=v)}
function add(k,n){if(k=='gold'){state.gold+=n;return true}if(free()<n){log('Bag full.');return false}state.inv[k]=(state.inv[k]||0)+n;return true}
function nm(k){return ITEMS[k]||k}

function resize(){let r=c.getBoundingClientRect();c.width=Math.max(1,r.width|0);c.height=Math.max(1,r.height|0)}
addEventListener('resize',resize);resize();

function basis(){
  let l=CAMS[state.camera],
  d={N:[[1,0],[0,-1],'s'],NE:[[1,-1],[-1,-1],'i'],E:[[0,1],[1,0],'s'],SE:[[1,1],[1,-1],'i'],S:[[-1,0],[0,1],'s'],SW:[[-1,1],[1,1],'i'],W:[[0,-1],[-1,0],'s'],NW:[[-1,-1],[-1,1],'i']}[l],
  n=v=>{let m=Math.hypot(...v)||1;return[v[0]/m,v[1]/m]};
  return{r:n(d[0]),u:n(d[1]),m:d[2],l}
}

// Camera follow: scr now centers on visual position (anim.vx/vy)
function scr(x,y,z=0){
  let b=basis(),lx=x-anim.vx,ly=y-anim.vy,
  sx=lx*b.r[0]+ly*b.r[1],sy=lx*b.u[0]+ly*b.u[1],px,py;
  if(b.m=='s'){px=sx*48;py=-sy*42-z*30}
  else{px=sx*tw*.52;py=-sy*th*.72-z*28}
  return{x:px+c.width/2,y:py+c.height/2+26}
}

function ents(){
  if(state.zone=='CopperHills')return[
    {id:'return',name:'Road to Village',kind:'travel',target:'Village',x:1,y:13,w:1,h:1,icon:'🏡'},
    {id:'cu1',name:'Copper rock',kind:'res',res:'copperOre',x:8,y:7,w:1,h:1,solid:1,icon:'⛏️'},
    {id:'cu2',name:'Copper rock',kind:'res',res:'copperOre',x:11,y:9,w:1,h:1,solid:1,icon:'⛏️'},
    {id:'fe1',name:'Iron rock',kind:'res',res:'ironOre',x:14,y:11,w:1,h:1,solid:1,icon:'⛏️'},
    {id:'gob',name:'Goblin',kind:'enemy',enemy:'goblin',x:16,y:8,w:1,h:1,icon:'👺'},
    {id:'furn',name:'Crude furnace',kind:'station',x:17,y:10,w:1.5,h:1.5,solid:1,icon:'🔥'}
  ];
  return[
    {id:'bank',name:'Bank',kind:'building',panel:'bank',x:11,y:4,w:2,h:2,solid:1,icon:'🏦'},
    {id:'shop',name:'Shop',kind:'building',panel:'shop',x:6,y:4,w:2,h:2,solid:1,icon:'🏪'},
    {id:'inn',name:'Inn',kind:'building',panel:'inn',x:2,y:8,w:2,h:2,solid:1,icon:'🛏️'},
    {id:'smithy',name:'Smithy',kind:'building',panel:'smithy',x:11,y:10,w:2,h:2,solid:1,icon:'⚒️'},
    {id:'pond',name:'Fishing pond',kind:'res',res:'rawFish',x:3,y:12,w:2,h:2,solid:1,icon:'🎣'},
    {id:'travel',name:'Road to Copper Hills',kind:'travel',target:'CopperHills',x:16,y:8,w:1,h:1,icon:'⛰️'},
    {id:'tree1',name:'Tree',kind:'res',res:'logs',x:2,y:3,w:1,h:1,solid:1,icon:'🌳'},
    {id:'tree2',name:'Tree',kind:'res',res:'logs',x:4,y:3,w:1,h:1,solid:1,icon:'🌳'},
    {id:'cu',name:'Copper rock',kind:'res',res:'copperOre',x:12,y:13,w:1,h:1,solid:1,icon:'⛏️'},
    {id:'fe',name:'Iron rock',kind:'res',res:'ironOre',x:14,y:12,w:1,h:1,solid:1,icon:'⛏️'},
    {id:'rat',name:'Giant Rat',kind:'enemy',enemy:'rat',x:6,y:12,w:1,h:1,icon:'🐀'},
    {id:'q1',name:'Forester Finn',kind:'quest',quest:'lumber',x:3,y:5,w:1,h:1,icon:'🧑‍🌾'},
    {id:'q2',name:'Miner Mags',kind:'quest',quest:'copper',x:12,y:12,w:1,h:1,icon:'👷'},
    {id:'q3',name:'Cook Pete',kind:'quest',quest:'fish',x:4,y:9,w:1,h:1,icon:'👨‍🍳'},
    {id:'q4',name:'Guard Bria',kind:'quest',quest:'guard',x:8,y:8,w:1,h:1,icon:'🛡️'}
  ]
}

function can(x,y){return x>.4&&y>.4&&x<world.w-.4&&y<world.h-.4&&!ents().some(e=>e.solid&&x>e.x-.2&&x<e.x+(e.w||1)+.2&&y>e.y-.2&&y<e.y+(e.h||1)+.2)}
function dist(e){let px=state.player.x,py=state.player.y,cx=Math.max(e.x,Math.min(px,e.x+(e.w||1))),cy=Math.max(e.y,Math.min(py,e.y+(e.h||1)));return Math.hypot(px-cx,py-cy)}
function near(){return ents().filter(e=>dist(e)<1.65)}

function update(dt){
  if(job){
    // bob in place while working
    anim.actionTimer+=dt;
    anim.isActing=true;
    anim.isMoving=false;
    return;
  }
  anim.isActing=false;

  let dx=0,dy=0;
  if(keys.up||keys.ArrowUp||keys.w)dy--;
  if(keys.down||keys.ArrowDown||keys.s)dy++;
  if(keys.left||keys.ArrowLeft||keys.a)dx--;
  if(keys.right||keys.ArrowRight||keys.d)dx++;

  let moving=!!(dx||dy);
  anim.isMoving=moving;

  if(moving){
    // Face the direction the player is pressing on-screen, not just the world-vector.
    // This fixes the old "side-step dance" where the body slid sideways while moving north/south.
    const rawDx=dx, rawDy=dy;
    if(Math.abs(rawDx)>0 && Math.abs(rawDx)>=Math.abs(rawDy)) anim.viewDir=rawDx>0?'right':'left';
    else if(rawDy<0) anim.viewDir='up';
    else if(rawDy>0) anim.viewDir='down';

    let m=Math.hypot(dx,dy);dx/=m;dy/=m;
    let b=basis(),wx=b.r[0]*dx+b.u[0]*(-dy),wy=b.r[1]*dx+b.u[1]*(-dy);
    let sp=3.2*dt,nx=state.player.x+wx*sp,ny=state.player.y+wy*sp;
    if(can(nx,state.player.y))state.player.x=nx;
    if(can(state.player.x,ny))state.player.y=ny;

    // Walk cycle
    anim.walkTime+=dt*6;
    anim.stepPhase=(anim.walkTime%(Math.PI*2))/(Math.PI*2);

    // Determine facing from world movement direction
    let angle=Math.atan2(wy,wx)*180/Math.PI;
    if(angle>=-22.5&&angle<22.5)anim.facingDir='E';
    else if(angle>=22.5&&angle<67.5)anim.facingDir='SE';
    else if(angle>=67.5&&angle<112.5)anim.facingDir='S';
    else if(angle>=112.5&&angle<157.5)anim.facingDir='SW';
    else if(angle>=157.5||angle<-157.5)anim.facingDir='W';
    else if(angle>=-157.5&&angle<-112.5)anim.facingDir='NW';
    else if(angle>=-112.5&&angle<-67.5)anim.facingDir='N';
    else anim.facingDir='NE';

    // Footprints
    let now=performance.now();
    if(now-anim.lastFootAt>350){
      anim.lastFootAt=now;
      let fp=scr(state.player.x,state.player.y,0);
      anim.footprints.push({x:fp.x,y:fp.y,age:0,side:anim.footprints.length%2});
    }
  }

  // Smooth camera follow
  let lerpSpeed=8*dt;
  anim.vx+=(state.player.x-anim.vx)*lerpSpeed;
  anim.vy+=(state.player.y-anim.vy)*lerpSpeed;

  // Age footprints
  anim.footprints=anim.footprints.filter(f=>{f.age+=dt;return f.age<1.8});
}

// ── DRAWING ──────────────────────────────────────────────────────────────────

function road(x,y){return(y>=8&&y<=9&&x>=2&&x<=16)||(x>=6&&x<=11&&y>=5&&y<=6)||(x>=8&&x<=9&&y>=4&&y<=13)||(x>=3&&x<=9&&y>=12&&y<=13)||(x>=9&&x<=13&&y>=10&&y<=11)}
function tileType(x,y){
  if(state.zone=='CopperHills'){if(x==2||y==13)return'dirt';return(x+y)%3?'rock':'rock2'}
  if(road(x,y))return'dirt';
  if(x>17&&y>5&&y<12)return'water';
  return(x+y)%2?'grass2':'grass'
}

function poly(p,f,s='#ffffff12'){ctx.beginPath();ctx.moveTo(p[0].x,p[0].y);for(let i=1;i<p.length;i++)ctx.lineTo(p[i].x,p[i].y);ctx.closePath();ctx.fillStyle=f;ctx.fill();ctx.strokeStyle=s;ctx.stroke()}
function ell(x,y,rx,ry,f){ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,7);ctx.fillStyle=f;ctx.fill()}
function tile(x,y){return[scr(x,y),scr(x+1,y),scr(x+1,y+1),scr(x,y+1)]}
function drawTile(x,y,t){
  let col={grass:'#176b37',grass2:'#145d31',dirt:'#a44912',rock:'#475569',rock2:'#64748b',water:'#075985'}[t];
  poly(tile(x,y),col,t=='water'?'#7dd3fc44':'#ffffff0c')
}

function cen(e,z=0){return scr(e.x+(e.w||1)/2,e.y+(e.h||1)/2,z)}

const NPC_STYLE={
  q1:{shirt:'#15803d',accent:'#166534',hair:'#78350f',skin:'#f3d3aa',label:'🌲'},
  q2:{shirt:'#6b7280',accent:'#4b5563',hair:'#3f3f46',skin:'#f1c79b',label:'⛏️'},
  q3:{shirt:'#f97316',accent:'#ea580c',hair:'#7c2d12',skin:'#f3d3aa',label:'🍳'},
  q4:{shirt:'#2563eb',accent:'#1d4ed8',hair:'#111827',skin:'#eec39a',label:'🛡️'},
  npc:{shirt:'#0f766e',accent:'#0d9488',hair:'#78350f',skin:'#f3d3aa',label:'💬'}
};

function drawNpc(e){
  const p=cen(e), s=NPC_STYLE[e.id]||NPC_STYLE.npc;
  const bob=Math.sin(performance.now()/450 + (e.x*0.8+e.y*0.6))*1.5;
  const t=(performance.now()/700 + e.x + e.y);
  const armSwing=Math.sin(t)*6;
  ctx.save();
  ctx.translate(p.x,p.y+bob);
  // shadow
  ctx.globalAlpha=.32;
  ell(0,10,18,6,'#000');
  ctx.globalAlpha=1;
  // legs
  ctx.fillStyle='#1e3a8a';
  ctx.beginPath();ctx.roundRect(-7,-2,5,14,3);ctx.fill();
  ctx.beginPath();ctx.roundRect(2,-2,5,14,3);ctx.fill();
  ctx.fillStyle='#422006';
  ctx.beginPath();ctx.roundRect(-8,10,7,5,2);ctx.fill();
  ctx.beginPath();ctx.roundRect(1,10,7,5,2);ctx.fill();
  // left arm behind body
  ctx.save();
  ctx.translate(-10,-13);
  ctx.rotate((armSwing*Math.PI)/180);
  ctx.fillStyle=s.accent;
  ctx.beginPath();ctx.roundRect(-3,0,6,14,3);ctx.fill();
  ctx.fillStyle=s.skin;
  ctx.beginPath();ctx.arc(0,15,4,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // body
  ctx.fillStyle=s.shirt;
  ctx.beginPath();ctx.roundRect(-10,-20,20,24,5);ctx.fill();
  ctx.fillStyle=s.accent;
  ctx.fillRect(-10,-2,20,4);
  // right arm in front
  ctx.save();
  ctx.translate(10,-13);
  ctx.rotate(((-armSwing)*Math.PI)/180);
  ctx.fillStyle=s.shirt;
  ctx.beginPath();ctx.roundRect(-3,0,6,14,3);ctx.fill();
  ctx.fillStyle=s.skin;
  ctx.beginPath();ctx.arc(0,15,4,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // head
  ctx.fillStyle=s.skin;
  ctx.beginPath();ctx.roundRect(-4,-27,8,7,2);ctx.fill();
  ctx.beginPath();ctx.ellipse(0,-33,10,12,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=s.hair;
  ctx.beginPath();ctx.ellipse(0,-39,10,6,0,Math.PI,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(-9,-34,3.5,5,.4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1f2937';
  ctx.beginPath();ctx.arc(-3,-33,1.7,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(3,-33,1.7,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#92400e';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.arc(0,-29,3,0.15,Math.PI-0.15);ctx.stroke();
  // profession badge over head for readability
  ctx.font='16px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(s.label||e.icon||'🙂',0,-52);
  ctx.restore();
}

function drawEnt(e){
  let p=cen(e);
  ell(p.x,p.y+10,22,7,'#0005');
  if(e.kind=='building'||e.kind=='station'){
    let top=cen(e,1.1);
    ctx.font='38px system-ui';ctx.textAlign='center';ctx.fillText(e.icon,top.x,top.y);return
  }
  if(e.kind=='quest'||e.kind=='npc'){
    drawNpc(e);return
  }
  if(e.kind=='res'&&e.res=='logs'){
    let t=cen(e,1.5);
    ctx.strokeStyle='#7c2d12';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(t.x,t.y+18);ctx.stroke();
    ell(t.x,t.y,28,20,'#166534');return
  }
  if(e.kind=='res'&&e.res=='rawFish'){
    poly([scr(e.x,e.y),scr(e.x+2,e.y),scr(e.x+2,e.y+2),scr(e.x,e.y+2)],'#075985','#7dd3fc55')
  }
  ctx.font='28px system-ui';ctx.textAlign='center';ctx.fillText(e.icon||'🙂',p.x,p.y-6)
}

// ── ANIMATED PLAYER CHARACTER ─────────────────────────────────────────────

function drawPlayer(){
  let px=scr(state.player.x, state.player.y);
  let x=px.x, y=px.y;

  // Screen-facing pose fixes the old sideways shuffle.
  // Moving up/down now uses back/front poses instead of a flipped side pose.
  let pose=anim.viewDir||'down';
  let t=anim.stepPhase*Math.PI*2;
  let isMoving=anim.isMoving;
  let isActing=anim.isActing;
  let bodyBob=isMoving?Math.sin(t)*2.4:0;
  let actBob=isActing?Math.sin(anim.actionTimer*9)*4:0;
  let totalBob=bodyBob+actBob;
  let step=isMoving?Math.sin(t):0;
  let armStep=isMoving?Math.sin(t+Math.PI):0;

  function boot(x,y,w=8,h=5){
    ctx.fillStyle='#422006';
    ctx.beginPath();ctx.roundRect(x,y,w,h,2);ctx.fill();
  }

  ctx.save();
  ctx.translate(x, y+totalBob);

  // Shadow
  ctx.save();
  ctx.translate(0,18);
  ctx.globalAlpha=0.35;
  ell(0,0,isMoving?22+Math.abs(step)*4:20,8,'#000');
  ctx.globalAlpha=1;
  ctx.restore();

  if(pose==='left'||pose==='right'){
    let flip=pose==='left';
    if(flip)ctx.scale(-1,1);
    let legSwing=isMoving?step*18:0;
    let armSwing=isMoving?armStep*22:0;

    // Legs, side profile
    ctx.save();
    ctx.translate(-5,2);
    ctx.rotate((legSwing)*Math.PI/180);
    ctx.fillStyle='#1e40af';ctx.beginPath();ctx.roundRect(-4,0,8,14,3);ctx.fill();
    boot(-5,13,10,7);
    ctx.restore();

    ctx.save();
    ctx.translate(5,2);
    ctx.rotate((-legSwing)*Math.PI/180);
    ctx.fillStyle='#1d4ed8';ctx.beginPath();ctx.roundRect(-4,0,8,14,3);ctx.fill();
    boot(-5,13,10,7);
    ctx.restore();

    // Back arm
    ctx.save();
    ctx.translate(-9,-16);
    ctx.rotate((armSwing)*Math.PI/180);
    ctx.fillStyle='#0d9488';ctx.beginPath();ctx.roundRect(-4,0,7,14,3);ctx.fill();
    ctx.fillStyle='#e8c99a';ctx.beginPath();ctx.arc(0,16,5,0,Math.PI*2);ctx.fill();
    ctx.restore();

    // Torso
    ctx.fillStyle='#0f766e';ctx.beginPath();ctx.roundRect(-9,-20,18,24,4);ctx.fill();
    ctx.fillStyle='#78350f';ctx.fillRect(-9,0,18,4);
    ctx.fillStyle='#0d9488';ctx.beginPath();ctx.roundRect(-7,-18,7,20,3);ctx.fill();

    // Front arm
    ctx.save();
    ctx.translate(9,-16);
    ctx.rotate((-armSwing)*Math.PI/180);
    ctx.fillStyle='#0f766e';ctx.beginPath();ctx.roundRect(-3,0,7,14,3);ctx.fill();
    ctx.fillStyle='#f5deb3';ctx.beginPath();ctx.arc(0,16,5,0,Math.PI*2);ctx.fill();
    if(state.eq&&state.eq.weapon&&state.eq.weapon!=='fists'){
      ctx.save();ctx.translate(0,16);ctx.rotate(isActing?Math.sin(anim.actionTimer*9)*0.5:0.3);
      ctx.fillStyle='#94a3b8';ctx.beginPath();ctx.roundRect(-2,2,4,20,1);ctx.fill();
      ctx.fillStyle='#78350f';ctx.fillRect(-6,0,12,5);ctx.restore();
    }
    ctx.restore();

    // Head side
    ctx.save();
    ctx.translate(0,-20+(isMoving?Math.sin(t*2)*1.2:0));
    ctx.fillStyle='#f5deb3';ctx.beginPath();ctx.roundRect(-4,0,8,6,2);ctx.fill();
    ctx.beginPath();ctx.ellipse(0,-10,10,12,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#78350f';ctx.beginPath();ctx.ellipse(0,-19,10,6,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(-10,-14,4,5,0.4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1e1b4b';ctx.beginPath();ctx.arc(5,-10,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#c2956a';ctx.beginPath();ctx.arc(9,-8,1.5,0,Math.PI*2);ctx.fill();
    if(state.eq&&state.eq.shield){
      ctx.fillStyle='#64748b';ctx.beginPath();ctx.ellipse(0,-20,11,5,0,Math.PI,Math.PI*2);ctx.fill();
      ctx.fillStyle='#475569';ctx.beginPath();ctx.roundRect(-12,-22,24,5,2);ctx.fill();
    }
    ctx.restore();
  }else{
    // Front/back profile for vertical movement.
    let front=pose==='down';
    let legY=Math.abs(step)*2;
    let leftLift=step>0?Math.abs(step)*4:0;
    let rightLift=step<0?Math.abs(step)*4:0;
    let armSwing=isMoving?step*5:0;

    // Back arm first
    ctx.save();
    ctx.translate(-11,-15);
    ctx.rotate((front?armSwing:-armSwing)*Math.PI/180);
    ctx.fillStyle=front?'#0d9488':'#0f766e';
    ctx.beginPath();ctx.roundRect(-3,0,6,16,3);ctx.fill();
    ctx.fillStyle=front?'#e8c99a':'#d6b48c';
    ctx.beginPath();ctx.arc(0,17,4.5,0,Math.PI*2);ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.translate(11,-15);
    ctx.rotate((front?-armSwing:armSwing)*Math.PI/180);
    ctx.fillStyle=front?'#0f766e':'#0d9488';
    ctx.beginPath();ctx.roundRect(-3,0,6,16,3);ctx.fill();
    ctx.fillStyle=front?'#f5deb3':'#d6b48c';
    ctx.beginPath();ctx.arc(0,17,4.5,0,Math.PI*2);ctx.fill();
    ctx.restore();

    // Legs walk toward/away from camera, not sideways.
    ctx.fillStyle='#1e40af';
    ctx.beginPath();ctx.roundRect(-8,0-leftLift,7,15+leftLift*.35,3);ctx.fill();
    ctx.fillStyle='#1d4ed8';
    ctx.beginPath();ctx.roundRect(1,0-rightLift,7,15+rightLift*.35,3);ctx.fill();
    boot(-9,13-leftLift*.25,8,5);
    boot(1,13-rightLift*.25,8,5);

    // Torso front/back
    ctx.fillStyle=front?'#0f766e':'#0d9488';
    ctx.beginPath();ctx.roundRect(-10,-21,20,25,5);ctx.fill();
    ctx.fillStyle='#78350f';ctx.fillRect(-10,0,20,4);
    ctx.fillStyle=front?'#0d9488':'#075985';
    ctx.beginPath();ctx.roundRect(-5,-18,10,18,3);ctx.fill();

    // Head front/back
    ctx.save();
    ctx.translate(0,-21+(isMoving?Math.sin(t*2)*1.0:0));
    ctx.fillStyle='#f5deb3';
    ctx.beginPath();ctx.roundRect(-4,0,8,6,2);ctx.fill();
    ctx.beginPath();ctx.ellipse(0,-10,10,12,0,0,Math.PI*2);ctx.fill();

    ctx.fillStyle='#78350f';
    if(front){
      ctx.beginPath();ctx.ellipse(0,-19,10,6,0,Math.PI,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(-9,-14,3.5,5,.3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#1e1b4b';
      ctx.beginPath();ctx.arc(-4,-10,2.3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(4,-10,2.3,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#92400e';ctx.lineWidth=1.4;
      ctx.beginPath();ctx.arc(0,-6,3,0.1,Math.PI-0.1);ctx.stroke();
    }else{
      // Back of head: no face, bigger hair cap
      ctx.beginPath();ctx.ellipse(0,-12,10.5,12,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#5b2a0c';
      ctx.beginPath();ctx.ellipse(0,-18,11,7,0,Math.PI,Math.PI*2);ctx.fill();
    }

    if(state.eq&&state.eq.shield){
      ctx.fillStyle='#64748b';ctx.beginPath();ctx.ellipse(0,-20,11,5,0,Math.PI,Math.PI*2);ctx.fill();
      ctx.fillStyle='#475569';ctx.beginPath();ctx.roundRect(-12,-22,24,5,2);ctx.fill();
    }
    ctx.restore();
  }

  // Action effect
  if(isActing){
    let spark=anim.actionTimer;
    for(let i=0;i<4;i++){
      let a=spark*3+i*Math.PI/2;
      let r=14+Math.sin(spark*7+i)*5;
      let sx=Math.cos(a)*r, sy=Math.sin(a)*r-10;
      ctx.fillStyle=`hsla(${40+i*30},90%,60%,${0.6+Math.sin(spark*8+i)*0.4})`;
      ctx.beginPath();ctx.arc(sx,sy,2.5,0,Math.PI*2);ctx.fill();
    }
  }

  ctx.restore();
}
function drawFootprints(){
  for(let f of anim.footprints){
    let alpha=Math.max(0,0.25*(1-f.age/1.8));
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.fillStyle='#92400e';
    let ox=f.side?4:-4;
    ctx.beginPath();ctx.ellipse(f.x+ox,f.y+16,5,3,0.3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

function depth(e){return cen(e).y+(e.solid?24:10)}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  // Tiles
  for(let y=-4;y<world.h+4;y++)for(let x=-4;x<world.w+4;x++)drawTile(x,y,tileType(x,y));

  // Footprints on ground
  drawFootprints();

  // Entities + player sorted by depth
  let a=ents().map(e=>({e,d:depth(e)}));
  a.push({player:1,d:scr(state.player.x,state.player.y).y+14});
  a.sort((x,y)=>x.d-y.d).forEach(o=>o.player?drawPlayer():drawEnt(o.e));

  // Highlight ring around nearby entities
  near().forEach(e=>{
    let p=cen(e);
    ctx.strokeStyle='#facc15dd';ctx.lineWidth=3;
    ctx.beginPath();ctx.ellipse(p.x,p.y+9,30,12,0,0,7);ctx.stroke()
  });
}

function render(){
  ui.stats.innerHTML=`<span class='pill'>💰 ${state.gold}g</span><span class='pill'>❤️ ${state.hp}/${state.maxHp}</span><span class='pill'>🎒 ${used()}/${state.bagMax}</span><span class='pill'>⭐ ${near().length}</span>`;
  ui.hud.innerHTML=`<span class='pill'>${state.zone}</span><span class='pill'>Nearby ${near().length}</span>`;
  ui.camBtn.textContent='🎥 Camera '+CAMS[state.camera];
  $('bank').style.display=near().some(e=>e.id=='bank')?'block':'none';
  $('shop').style.display=near().some(e=>e.id=='shop')?'block':'none'
}

function loop(now){
  let dt=Math.min(.05,(now-last)/1000);last=now;
  update(dt);
  if(job){let p=Math.min(1,(now-job.start)/job.dur);ui.bar.style.width=p*100+'%';if(p>=1)finish()}
  draw();render();
  requestAnimationFrame(loop)
}
requestAnimationFrame(loop);

// ── INTERACTIONS ─────────────────────────────────────────────────────────────

function useNear(){let n=near();if(!n.length)return log('Nothing nearby.');if(n.length==1)return interact(n[0]);modal('Choose Nearby','Pick a target.',n.map((e,i)=>`<button onclick='interact(near()[${i}]);closePanel()'>${e.icon||''} ${e.name}</button>`).join(''))}
function modal(t,h,b){ui.o.classList.add('show');ui.mt.textContent=t;ui.mh.textContent=h||'';ui.mb.innerHTML=b||''}
function closePanel(){ui.o.classList.remove('show')}
window.closePanel=closePanel;window.interact=interact;window.near=near;
$('x').onclick=closePanel;

function toolName(k,l){if(k=='axe')return l>1?'Bronze Axe':'Starter Axe';if(k=='pickaxe')return l>1?'Bronze Pickaxe':'Starter Pickaxe';if(k=='rod')return l>1?'Better Rod':'Starter Rod';return k}
function toolsHtml(){let t=state.tools||{axe:1,pickaxe:1,rod:1};return `<div class='card'><b>🧰 Tools</b><div class='small'>Tools are upgrades, not bag items.</div><div class='small'>Woodcutting: <b>${toolName('axe',t.axe||1)}</b></div><div class='small'>Mining: <b>${toolName('pickaxe',t.pickaxe||1)}</b></div><div class='small'>Fishing: <b>${toolName('rod',t.rod||1)}</b></div></div>`}

function openPanel(k){
  if(k=='bag')return modal('🎒 Bag',`Bag ${used()}/${state.bagMax}`,toolsHtml()+Object.keys(ITEMS).map(i=>`<div class='card'><b>${nm(i)}</b><div class='small'>Carry: ${state.inv[i]||0}</div></div>`).join(''));
  if(k=='skills')return modal('⚡ Skills','XP and levels',Object.entries(state.skills).map(([s,x])=>`<div class='card'><b>${s}</b><div>Level ${lvl(x)} • ${x} XP</div></div>`).join(''));
  if(k=='gear')return modal('🛡️ Gear',`A${stats().atk} D${stats().def}`,state.owned.map(id=>`<button onclick='equip("${id}")'>Equip ${GEAR[id].name}</button>`).join(''));
  if(k=='bank')return bankPanel();
  if(k=='shop')return shopPanel();
  if(k=='smithy')return smithyPanel();
  if(k=='quests')return questPanel();
  if(k=='log')return modal('Log','Recent actions',state.log.map(l=>`<div class='card'>${l}</div>`).join(''))
}

function bankPanel(){modal('🏦 Bank','Deposit and withdraw',Object.keys(ITEMS).map(k=>`<div class='card'><b>${nm(k)}</b><div class='small'>Bag ${state.inv[k]||0} • Bank ${state.bank[k]||0}</div><button onclick='dep("${k}",1)'>Dep 1</button><button onclick='dep("${k}",999)'>Dep All</button><button onclick='withd("${k}",1)'>With 1</button><button onclick='withd("${k}",999)'>With All</button></div>`).join(''))}
function dep(k,n){let q=Math.min(n,state.inv[k]||0);state.inv[k]-=q;state.bank[k]+=q;save();bankPanel()}
function withd(k,n){let q=Math.min(n,state.bank[k]||0,free());state.bank[k]-=q;state.inv[k]+=q;save();bankPanel()}
window.dep=dep;window.withd=withd;

function shopPanel(){
  let buyHtml=SHOP.map((it,i)=>{let [name,type,key,lvl,cost]=it,owned=false;if(type=='tool')owned=(state.tools&&Number(state.tools[key]||1)>=Number(lvl||1));if(type=='gear')owned=(state.owned||[]).includes(key);let tag=owned?` <span class='ownedTag'>Owned</span>`:'';let detail=type=='tool'?'Tool upgrade • does not use bag space':type=='gear'?'Equipment':'Inventory upgrade';return `<div class='card'><b>${name}${tag}</b><div class='small'>${detail} • ${cost}g</div><button ${owned?'disabled':''} onclick='buy(${i})'>${owned?'Owned':'Buy'}</button></div>`}).join('');
  let sellHtml=Object.keys(ITEMS).map(k=>`<div class='card'><b>${nm(k)}</b><div class='small'>${state.inv[k]||0} carried • ${PRICE[k]}g</div><button onclick='sell("${k}",1)'>Sell 1</button><button onclick='sell("${k}",999)'>Sell All</button></div>`).join('');
  modal('🏪 Shop','Buy upgrades and sell items.',toolsHtml()+buyHtml+'<hr>'+sellHtml)
}
function buy(i){let it=SHOP[i],name=it[0],type=it[1],key=it[2],level=it[3],cost=it[4];if(type=='tool'&&state.tools&&Number(state.tools[key]||1)>=Number(level||1)){log(name+' already owned.');return shopPanel()}if(type=='gear'&&(state.owned||[]).includes(key)){log(name+' already owned.');return shopPanel()}if(state.gold<cost)return log('Need more gold.');state.gold-=cost;if(type=='tool')state.tools[key]=level;if(type=='gear'&&!state.owned.includes(key))state.owned.push(key);if(type=='bag')state.bagMax+=level;log('Bought '+name+'.');save();shopPanel()}
function sell(k,n){let q=Math.min(n,state.inv[k]||0);state.inv[k]-=q;state.gold+=q*PRICE[k];save();shopPanel()}
window.buy=buy;window.sell=sell;

function smithyPanel(){let raw=state.inv.rawFish||0;modal('⚒️ Smithy','Cook and smelt',`<div class='card'><b>Cook Fish</b><div class='small'>Raw ${raw}</div><button onclick='cook(1)'>Cook 1</button><button onclick='cook(5)'>Cook 5</button><button onclick='cook(999)'>Cook All</button></div><div class='card'><b>Smelt</b><button onclick='smelt()'>1 Copper + 1 Logs = 7g</button></div>`)}
function cook(n){let q=Math.min(n,state.inv.rawFish||0);if(!q)return;start({label:'Cooking '+q+' fish...',sec:Math.min(7,q*.75),need:{rawFish:q},reward:{cookedFish:q},skill:'cooking',xp:q*9,done:'Cooked '+q+' fish.'});closePanel()}
function smelt(){if(!has({copperOre:1,logs:1}))return log('Need copper and logs.');start({label:'Smelting...',sec:2.2,need:{copperOre:1,logs:1},reward:{gold:7},skill:'smithing',xp:14,done:'Smelted goods.'});closePanel()}
window.cook=cook;window.smelt=smelt;
function equip(id){let g=GEAR[id];state.eq[g.slot]=id;save();openPanel('gear')}
window.equip=equip;

function openQuest(id){let q=QUESTS[id],st=state.quests[id],r=st=='active'&&has(q.need),need=Object.entries(q.need).map(([k,v])=>`${nm(k)} ${(state.inv[k]||0)}/${v}`).join(', ');modal('📜 Quest',q.npc,`<div class='card ${r?'ready':''}'><b>${q.text}</b><div class='small'>Need: ${need}</div><div>Status: ${r?'Ready':st}</div>${st=='not_started'?`<button onclick='startQuest("${id}")'>Accept</button>`:''}${r?`<button onclick='turnQuest("${id}")'>Turn In</button>`:''}</div>`)}
function questPanel(){modal('📜 Quests','Village jobs',Object.keys(QUESTS).map(id=>`<div class='card'><b>${QUESTS[id].npc}</b><div>${QUESTS[id].text}</div><button onclick='openQuest("${id}")'>View</button></div>`).join(''))}
function startQuest(id){state.quests[id]='active';save();openQuest(id)}
function turnQuest(id){let q=QUESTS[id];if(!has(q.need))return;take(q.need);state.gold+=q.reward.gold;Object.entries(q.reward.xp).forEach(([k,v])=>gain(k,v));state.quests[id]='complete';log('Quest complete: '+q.npc);save();openQuest(id)}
window.openQuest=openQuest;window.startQuest=startQuest;window.turnQuest=turnQuest;

function stats(){let atk=0,def=0;Object.values(state.eq).forEach(id=>{let g=GEAR[id];if(g){atk+=g.atk;def+=g.def}});return{atk:atk+Math.floor(lvl(state.skills.combat)/3),def}}

function interact(e){
  if(!e)return;
  if(e.kind=='travel'){
    state.zone=e.target;
    state.player=e.target=='Village'?{x:16,y:8}:{x:2,y:13};
    anim.vx=state.player.x;anim.vy=state.player.y; // snap camera on zone change
    log('Traveled to '+e.target);save();return
  }
  if(e.kind=='building'||e.kind=='station'){if(e.panel=='inn'){state.hp=state.maxHp;log('Rested at the inn.');save();return}openPanel(e.panel||'smithy');return}
  if(e.kind=='quest')return openQuest(e.quest);
  if(e.kind=='res'){
    let r=e.res,skill=r=='logs'?'woodcutting':r=='rawFish'?'fishing':'mining',
    sec=r=='logs'?2.2/state.tools.axe:r=='rawFish'?2.8/state.tools.rod:r=='copperOre'?2.5/state.tools.pickaxe:3.4/state.tools.pickaxe,xp=r=='ironOre'?18:10;
    if(r=='logs')xp=8;
    start({label:(r=='logs'?'Chopping':r=='rawFish'?'Fishing':'Mining')+'...',sec,skill,xp,reward:{[r]:1},done:'Got 1 '+nm(r)+'.'});return
  }
  if(e.kind=='enemy'){
    let s=stats(),g=e.enemy=='goblin',dmg=Math.max(0,(g?6:3)-Math.floor(s.def*.5));
    start({label:'Fighting '+e.name+'...',sec:g?2.8:2,skill:'combat',xp:g?22:8,reward:g?{goblinEars:1,bones:1,gold:9}:{bones:1,gold:3},damage:dmg,done:'Defeated '+e.name+'.'});return
  }
}

function start(o){if(job)return;if(o.need&&!has(o.need)){log('Missing items.');return}if(o.need)take(o.need);job={...o,start:performance.now(),dur:(o.sec||2)*1000};anim.actionTimer=0;ui.prog.classList.add('show');ui.pt.textContent=o.label;ui.bar.style.width='0%'}
function finish(){let o=job;job=null;ui.prog.classList.remove('show');Object.entries(o.reward||{}).forEach(([k,v])=>add(k,v));if(o.skill)gain(o.skill,o.xp||0);if(o.damage)state.hp=Math.max(0,state.hp-o.damage);log(o.done);save()}

ui.camBtn.onclick=()=>ui.cam.classList.toggle('open');
document.querySelectorAll('[data-cam]').forEach(b=>b.onclick=()=>{state.camera=(state.camera+Number(b.dataset.cam)+8)%8;save()});
document.querySelectorAll('[data-set]').forEach(b=>b.onclick=()=>{state.camera=CAMS.indexOf(b.dataset.set);ui.cam.classList.remove('open');save()});
</script>
</body>
</html>
