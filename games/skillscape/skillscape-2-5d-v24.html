*{box-sizing:border-box}html,body{margin:0;background:#020617;color:#e5e7eb;font-family:system-ui,Arial,sans-serif;overflow:auto}.app{min-height:100dvh;display:flex;flex-direction:column}.top{position:sticky;top:0;z-index:5;background:#020617e6;border-bottom:1px solid #ffffff14;padding:.45rem .55rem;backdrop-filter:blur(8px)}.row{display:flex;gap:.35rem;flex-wrap:wrap;align-items:center}.topline{justify-content:space-between}.title{font-weight:950;font-size:clamp(1.15rem,5vw,1.7rem)}button,a{border:1px solid #ffffff24;background:#0f172acc;color:#e5e7eb;border-radius:999px;padding:.45rem .6rem;font:inherit;font-weight:850;text-decoration:none}.pill{border:1px solid #ffffff1f;background:#ffffff12;border-radius:999px;padding:.22rem .48rem;font-size:.78rem;font-weight:850;color:#dbeafe}.shell{flex:1;padding:.4rem}.wrap{height:calc(100dvh - 205px);min-height:340px;position:relative;overflow:hidden;border-radius:18px;border:1px solid #ffffff18;background:radial-gradient(circle at 30% 10%,#22c55e22,transparent 22rem),#061023}canvas{width:100%;height:100%;display:block;touch-action:none}.hud{position:absolute;left:.45rem;top:.45rem;display:flex;gap:.3rem;flex-wrap:wrap;z-index:2;max-width:calc(100% - 8rem)}.cam{position:absolute;right:.45rem;top:.45rem;z-index:3;display:flex;flex-direction:column;align-items:flex-end;gap:.3rem}.camMenu{display:none;max-width:210px;gap:.25rem;flex-wrap:wrap;justify-content:flex-end;background:#020617c8;border:1px solid #ffffff24;border-radius:16px;padding:.35rem}.cam.open .camMenu{display:flex}.cam button{font-size:.72rem;padding:.32rem .45rem}.prog{position:absolute;left:.6rem;right:.6rem;bottom:.65rem;background:#020617dd;border:1px solid #ffffff2e;border-radius:15px;padding:.55rem;display:none;z-index:3}.prog.show{display:block}.barBox{height:12px;border-radius:999px;background:#0008;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,#38bdf8,#22c55e,#fbbf24)}.tray{position:sticky;bottom:0;z-index:6;background:linear-gradient(#020617cc,#020617fa);border-top:1px solid #ffffff14;padding:.5rem .55rem calc(.65rem + env(safe-area-inset-bottom));backdrop-filter:blur(8px)}#use{width:100%;min-height:44px;background:linear-gradient(90deg,#38bdf8,#22c55e);color:#02111f}.trayGrid{display:grid;grid-template-columns:auto 1fr;gap:.45rem;margin-top:.4rem;align-items:end}.dpad{display:grid;grid-template-columns:repeat(3,38px);gap:.24rem}.dpad span{visibility:hidden}.dpad button{height:36px;border-radius:12px;touch-action:none}.actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:.28rem}.actions button{min-height:36px;font-size:.72rem;padding:.32rem .14rem}.overlay{position:fixed;inset:0;background:#020617bb;z-index:20;display:none;align-items:center;justify-content:center;padding:1rem}.overlay.show{display:flex}.modal{width:min(760px,96vw);max-height:86dvh;overflow:auto;background:#0f172af5;border:1px solid #ffffff24;border-radius:22px;padding:1rem;box-shadow:0 25px 80px #0009}.modalHead{display:flex;justify-content:space-between;gap:.5rem}.modal h2{margin:.1rem 0}.hint,.small{color:#94a3b8;font-size:.85rem}.card{background:#1e293bcc;border:1px solid #ffffff1f;border-radius:16px;padding:.75rem;margin:.5rem 0}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.5rem}.ready{border-color:#22c55e99!important}button:disabled{opacity:.45}@media(max-width:520px){.shell{padding:.32rem}.wrap{height:calc(100dvh - 205px);min-height:325px}.grid{grid-template-columns:1fr}.dpad{grid-template-columns:repeat(3,35px)}.dpad button{height:34px}.actions button{font-size:.67rem}.hud .pill:nth-child(3){display:none}}

<body>
<div class='app'><header class='top'><div class='row topline'><div class='title'>Skillscape 2.5D</div><button id='menu'>☰ Menu</button></div><div class='row' id='stats'></div></header><main class='shell'><div class='wrap'><canvas id='game'></canvas><div class='hud' id='hud'></div><div class='cam' id='camBox'><button id='camBtn'>🎥 Camera NE</button><div class='camMenu'><button data-cam='-1'>↶</button><button data-cam='1'>↷</button><button data-set='NE'>NE</button><button data-set='E'>E</button><button data-set='SE'>SE</button><button data-set='S'>S</button><button data-set='SW'>SW</button><button data-set='W'>W</button><button data-set='NW'>NW</button><button data-set='N'>N</button></div></div><div class='prog' id='prog'><b id='progTxt'>Working...</b><div class='barBox'><div class='bar' id='bar'></div></div></div></div></main><nav class='tray'><button id='use'>Use Nearby</button><div class='trayGrid'><div class='dpad'><span></span><button data-dir='up'>▲</button><span></span><button data-dir='left'>◀</button><button data-dir='down'>▼</button><button data-dir='right'>▶</button></div><div class='actions'><button id='bag'>🎒 Bag</button><button id='skills'>⚡ Skills</button><button id='gear'>🛡️ Gear</button><button id='quests'>📜 Quests</button><button id='bank'>🏦 Bank</button><button id='shop'>🏪 Shop</button></div></div></nav></div><div class='overlay' id='overlay'><div class='modal'><div class='modalHead'><div><h2 id='mt'>Panel</h2><div class='hint' id='mh'></div></div><button id='x'>✕</button></div><div id='mb'></div></div></div>
<script>
const c=document.getElementById('game'),ctx=c.getContext('2d'),$=id=>document.getElementById(id);const ui={stats:$('stats'),hud:$('hud'),o:$('overlay'),mt:$('mt'),mh:$('mh'),mb:$('mb'),prog:$('prog'),pt:$('progTxt'),bar:$('bar'),cam:$('camBox'),camBtn:$('camBtn')};
const SAVE='skillscape_25d_v24_flat',CAMS=['NE','E','SE','S','SW','W','NW','N'],ITEMS={logs:'Logs',copperOre:'Copper Ore',ironOre:'Iron Ore',rawFish:'Raw Fish',cookedFish:'Cooked Fish',bones:'Bones',goblinEars:'Goblin Ears'},PRICE={logs:2,copperOre:3,ironOre:8,rawFish:3,cookedFish:6,bones:2,goblinEars:10};
const GEAR={fists:{name:'Bare Hands',slot:'weapon',atk:1,def:0},rustySword:{name:'Rusty Sword',slot:'weapon',atk:3,def:0},woodShield:{name:'Wood Shield',slot:'shield',atk:0,def:2},bronzeSword:{name:'Bronze Sword',slot:'weapon',atk:6,def:0}};
const SHOP=[['Bronze Axe','tool','axe',2,60],['Bronze Pickaxe','tool','pickaxe',2,60],['Better Rod','tool','rod',2,55],['Rusty Sword','gear','rustySword',0,50],['Wood Shield','gear','woodShield',0,55],['Bronze Sword','gear','bronzeSword',0,140],['Backpack +10','bag','bag',10,250]];
const QUESTS={lumber:{npc:'Forester Finn',need:{logs:10},reward:{gold:45,xp:{woodcutting:30}},text:'Bring 10 Logs.'},copper:{npc:'Miner Mags',need:{copperOre:12},reward:{gold:60,xp:{mining:35}},text:'Bring 12 Copper Ore.'},fish:{npc:'Cook Pete',need:{cookedFish:5},reward:{gold:75,xp:{cooking:35}},text:'Bring 5 Cooked Fish.'},guard:{npc:'Guard Bria',need:{bones:5},reward:{gold:90,xp:{combat:45}},text:'Bring 5 Bones.'}};
function empty(){return Object.fromEntries(Object.keys(ITEMS).map(k=>[k,0]))}function def(){return{zone:'Village',player:{x:8,y:8},camera:0,gold:60,hp:30,maxHp:30,bagMax:20,inv:empty(),bank:empty(),skills:{woodcutting:0,mining:0,fishing:0,cooking:0,combat:0,smithing:0},tools:{axe:1,pickaxe:1,rod:1},owned:['fists'],eq:{weapon:'fists',shield:null},quests:{lumber:'not_started',copper:'not_started',fish:'not_started',guard:'not_started'},log:['V24 standalone loaded.']}}function merge(a,b){for(const k in b){if(b[k]&&typeof b[k]=='object'&&!Array.isArray(b[k])&&a[k])merge(a[k],b[k]);else a[k]=b[k]}return a}let state;try{state=merge(def(),JSON.parse(localStorage.getItem(SAVE)||'{}'))}catch(e){state=def()}let keys={},job=null,last=performance.now(),world={w:20,h:16},tw=64,th=34;
function save(){localStorage.setItem(SAVE,JSON.stringify(state))}function log(t){state.log=[t,...state.log].slice(0,14);save()}function used(){return Object.values(state.inv).reduce((a,b)=>a+(+b||0),0)}function free(){return state.bagMax-used()}function lvl(x){let l=1;while(x>=Math.floor(50*Math.pow(l+1,1.55)))l++;return l}function gain(s,x){state.skills[s]=(state.skills[s]||0)+x}function has(r){return Object.entries(r).every(([k,v])=>(state.inv[k]||0)>=v)}function take(r){Object.entries(r).forEach(([k,v])=>state.inv[k]-=v)}function add(k,n){if(k=='gold'){state.gold+=n;return true}if(free()<n){log('Bag full.');return false}state.inv[k]=(state.inv[k]||0)+n;return true}function nm(k){return ITEMS[k]||k}
function resize(){let r=c.getBoundingClientRect();c.width=Math.max(1,r.width|0);c.height=Math.max(1,r.height|0)}addEventListener('resize',resize);resize();
function basis(){let l=CAMS[state.camera],d={N:[[1,0],[0,-1],'s'],NE:[[1,-1],[-1,-1],'i'],E:[[0,1],[1,0],'s'],SE:[[1,1],[1,-1],'i'],S:[[-1,0],[0,1],'s'],SW:[[-1,1],[1,1],'i'],W:[[0,-1],[-1,0],'s'],NW:[[-1,-1],[-1,1],'i']}[l],n=v=>{let m=Math.hypot(...v)||1;return[v[0]/m,v[1]/m]};return{r:n(d[0]),u:n(d[1]),m:d[2],l}}function scr(x,y,z=0){let b=basis(),lx=x-state.player.x,ly=y-state.player.y,sx=lx*b.r[0]+ly*b.r[1],sy=lx*b.u[0]+ly*b.u[1],px,py;if(b.m=='s'){px=sx*48;py=-sy*42-z*30}else{px=sx*tw*.52;py=-sy*th*.72-z*28}return{x:px+c.width/2,y:py+c.height/2+26}}
function ents(){if(state.zone=='CopperHills')return[{id:'return',name:'Road to Village',kind:'travel',target:'Village',x:1,y:13,w:1,h:1,icon:'🏡'},{id:'cu1',name:'Copper rock',kind:'res',res:'copperOre',x:8,y:7,w:1,h:1,solid:1,icon:'⛏️'},{id:'cu2',name:'Copper rock',kind:'res',res:'copperOre',x:11,y:9,w:1,h:1,solid:1,icon:'⛏️'},{id:'fe1',name:'Iron rock',kind:'res',res:'ironOre',x:14,y:11,w:1,h:1,solid:1,icon:'⛏️'},{id:'gob',name:'Goblin',kind:'enemy',enemy:'goblin',x:16,y:8,w:1,h:1,icon:'👺'},{id:'furn',name:'Crude furnace',kind:'station',x:17,y:10,w:1.5,h:1.5,solid:1,icon:'🔥'}];return[{id:'bank',name:'Bank',kind:'building',panel:'bank',x:11,y:4,w:2,h:2,solid:1,icon:'🏦'},{id:'shop',name:'Shop',kind:'building',panel:'shop',x:6,y:4,w:2,h:2,solid:1,icon:'🏪'},{id:'inn',name:'Inn',kind:'building',panel:'inn',x:2,y:8,w:2,h:2,solid:1,icon:'🛏️'},{id:'smithy',name:'Smithy',kind:'building',panel:'smithy',x:11,y:10,w:2,h:2,solid:1,icon:'⚒️'},{id:'pond',name:'Fishing pond',kind:'res',res:'rawFish',x:3,y:12,w:2,h:2,solid:1,icon:'🎣'},{id:'travel',name:'Road to Copper Hills',kind:'travel',target:'CopperHills',x:16,y:8,w:1,h:1,icon:'⛰️'},{id:'tree1',name:'Tree',kind:'res',res:'logs',x:2,y:3,w:1,h:1,solid:1,icon:'🌳'},{id:'tree2',name:'Tree',kind:'res',res:'logs',x:4,y:3,w:1,h:1,solid:1,icon:'🌳'},{id:'cu',name:'Copper rock',kind:'res',res:'copperOre',x:12,y:13,w:1,h:1,solid:1,icon:'⛏️'},{id:'fe',name:'Iron rock',kind:'res',res:'ironOre',x:14,y:12,w:1,h:1,solid:1,icon:'⛏️'},{id:'rat',name:'Giant Rat',kind:'enemy',enemy:'rat',x:6,y:12,w:1,h:1,icon:'🐀'},{id:'q1',name:'Forester Finn',kind:'quest',quest:'lumber',x:3,y:5,w:1,h:1,icon:'🧑‍🌾'},{id:'q2',name:'Miner Mags',kind:'quest',quest:'copper',x:12,y:12,w:1,h:1,icon:'👷'},{id:'q3',name:'Cook Pete',kind:'quest',quest:'fish',x:4,y:9,w:1,h:1,icon:'👨‍🍳'},{id:'q4',name:'Guard Bria',kind:'quest',quest:'guard',x:8,y:8,w:1,h:1,icon:'🛡️'}]}
function can(x,y){return x>.4&&y>.4&&x<world.w-.4&&y<world.h-.4&&!ents().some(e=>e.solid&&x>e.x-.2&&x<e.x+(e.w||1)+.2&&y>e.y-.2&&y<e.y+(e.h||1)+.2)}function dist(e){let px=state.player.x,py=state.player.y,cx=Math.max(e.x,Math.min(px,e.x+(e.w||1))),cy=Math.max(e.y,Math.min(py,e.y+(e.h||1)));return Math.hypot(px-cx,py-cy)}function near(){return ents().filter(e=>dist(e)<1.65)}
function update(dt){if(job)return;let dx=0,dy=0;if(keys.up||keys.ArrowUp||keys.w)dy--;if(keys.down||keys.ArrowDown||keys.s)dy++;if(keys.left||keys.ArrowLeft||keys.a)dx--;if(keys.right||keys.ArrowRight||keys.d)dx++;if(dx||dy){let m=Math.hypot(dx,dy);dx/=m;dy/=m;let b=basis(),wx=b.r[0]*dx+b.u[0]*(-dy),wy=b.r[1]*dx+b.u[1]*(-dy),sp=3.2*dt,nx=state.player.x+wx*sp,ny=state.player.y+wy*sp;if(can(nx,state.player.y))state.player.x=nx;if(can(state.player.x,ny))state.player.y=ny}}
function start(o){if(job)return;if(o.need&&!has(o.need)){log('Missing items.');return}if(o.need)take(o.need);job={...o,start:performance.now(),dur:(o.sec||2)*1000};ui.prog.classList.add('show');ui.pt.textContent=o.label;ui.bar.style.width='0%'}function finish(){let o=job;job=null;ui.prog.classList.remove('show');Object.entries(o.reward||{}).forEach(([k,v])=>add(k,v));if(o.skill)gain(o.skill,o.xp||0);if(o.damage)state.hp=Math.max(0,state.hp-o.damage);log(o.done);save()}
function stats(){let atk=0,def=0;Object.values(state.eq).forEach(id=>{let g=GEAR[id];if(g){atk+=g.atk;def+=g.def}});return{atk:atk+Math.floor(lvl(state.skills.combat)/3),def}}function interact(e){if(!e)return;if(e.kind=='travel'){state.zone=e.target;state.player=e.target=='Village'?{x:16,y:8}:{x:2,y:13};log('Traveled to '+e.target);save();return}if(e.kind=='building'||e.kind=='station'){if(e.panel=='inn'){state.hp=state.maxHp;log('Rested at the inn.');save();return}openPanel(e.panel||'smithy');return}if(e.kind=='quest')return openQuest(e.quest);if(e.kind=='res'){let r=e.res,skill=r=='logs'?'woodcutting':r=='rawFish'?'fishing':'mining',sec=r=='logs'?2.2/state.tools.axe:r=='rawFish'?2.8/state.tools.rod:r=='copperOre'?2.5/state.tools.pickaxe:3.4/state.tools.pickaxe,xp=r=='ironOre'?18:10;if(r=='logs')xp=8;start({label:(r=='logs'?'Chopping':r=='rawFish'?'Fishing':'Mining')+'...',sec,skill,xp,reward:{[r]:1},done:'Got 1 '+nm(r)+'.'});return}if(e.kind=='enemy'){let s=stats(),g=e.enemy=='goblin',dmg=Math.max(0,(g?6:3)-Math.floor(s.def*.5));start({label:'Fighting '+e.name+'...',sec:g?2.8:2,skill:'combat',xp:g?22:8,reward:g?{goblinEars:1,bones:1,gold:9}:{bones:1,gold:3},damage:dmg,done:'Defeated '+e.name+'.'});return}}
function useNear(){let n=near();if(!n.length)return log('Nothing nearby.');if(n.length==1)return interact(n[0]);modal('Choose Nearby','Pick a target.',n.map((e,i)=>`<button onclick='interact(near()[${i}]);closePanel()'>${e.icon||''} ${e.name}</button>`).join(''))}function modal(t,h,b){ui.o.classList.add('show');ui.mt.textContent=t;ui.mh.textContent=h||'';ui.mb.innerHTML=b||''}function closePanel(){ui.o.classList.remove('show')}window.closePanel=closePanel;window.interact=interact;window.near=near;$('x').onclick=closePanel;
function openPanel(k){if(k=='bag')return modal('🎒 Bag',`Bag ${used()}/${state.bagMax}`,Object.keys(ITEMS).map(i=>`<div class='card'><b>${nm(i)}</b><div class='small'>Carry: ${state.inv[i]||0}</div></div>`).join(''));if(k=='skills')return modal('⚡ Skills','XP and levels',Object.entries(state.skills).map(([s,x])=>`<div class='card'><b>${s}</b><div>Level ${lvl(x)} • ${x} XP</div></div>`).join(''));if(k=='gear')return modal('🛡️ Gear',`A${stats().atk} D${stats().def}`,state.owned.map(id=>`<button onclick='equip("${id}")'>Equip ${GEAR[id].name}</button>`).join(''));if(k=='bank')return bankPanel();if(k=='shop')return shopPanel();if(k=='smithy')return smithyPanel();if(k=='quests')return questPanel();if(k=='log')return modal('Log','Recent actions',state.log.map(l=>`<div class='card'>${l}</div>`).join(''))}
function bankPanel(){modal('🏦 Bank','Deposit and withdraw',Object.keys(ITEMS).map(k=>`<div class='card'><b>${nm(k)}</b><div class='small'>Bag ${state.inv[k]||0} • Bank ${state.bank[k]||0}</div><button onclick='dep("${k}",1)'>Dep 1</button><button onclick='dep("${k}",999)'>Dep All</button><button onclick='withd("${k}",1)'>With 1</button><button onclick='withd("${k}",999)'>With All</button></div>`).join(''))}function dep(k,n){let q=Math.min(n,state.inv[k]||0);state.inv[k]-=q;state.bank[k]+=q;save();bankPanel()}function withd(k,n){let q=Math.min(n,state.bank[k]||0,free());state.bank[k]-=q;state.inv[k]+=q;save();bankPanel()}window.dep=dep;window.withd=withd;
function shopPanel(){modal('🏪 Shop','Buy and sell',SHOP.map((it,i)=>`<div class='card'><b>${it[0]}</b><div class='small'>${it[4]}g</div><button onclick='buy(${i})'>Buy</button></div>`).join('')+'<hr>'+Object.keys(ITEMS).map(k=>`<div class='card'><b>${nm(k)}</b><div class='small'>${state.inv[k]||0} carried • ${PRICE[k]}g</div><button onclick='sell("${k}",1)'>Sell 1</button><button onclick='sell("${k}",999)'>Sell All</button></div>`).join(''))}function buy(i){let it=SHOP[i];if(state.gold<it[4])return log('Need more gold.');state.gold-=it[4];if(it[1]=='tool')state.tools[it[2]]=it[3];if(it[1]=='gear'&&!state.owned.includes(it[2]))state.owned.push(it[2]);if(it[1]=='bag')state.bagMax+=it[3];save();shopPanel()}function sell(k,n){let q=Math.min(n,state.inv[k]||0);state.inv[k]-=q;state.gold+=q*PRICE[k];save();shopPanel()}window.buy=buy;window.sell=sell;
function smithyPanel(){let raw=state.inv.rawFish||0;modal('⚒️ Smithy','Cook and smelt',`<div class='card'><b>Cook Fish</b><div class='small'>Raw ${raw}</div><button onclick='cook(1)'>Cook 1</button><button onclick='cook(5)'>Cook 5</button><button onclick='cook(999)'>Cook All</button></div><div class='card'><b>Smelt</b><button onclick='smelt()'>1 Copper + 1 Logs = 7g</button></div>`)}function cook(n){let q=Math.min(n,state.inv.rawFish||0);if(!q)return;start({label:'Cooking '+q+' fish...',sec:Math.min(7,q*.75),need:{rawFish:q},reward:{cookedFish:q},skill:'cooking',xp:q*9,done:'Cooked '+q+' fish.'});closePanel()}function smelt(){if(!has({copperOre:1,logs:1}))return log('Need copper and logs.');start({label:'Smelting...',sec:2.2,need:{copperOre:1,logs:1},reward:{gold:7},skill:'smithing',xp:14,done:'Smelted goods.'});closePanel()}window.cook=cook;window.smelt=smelt;function equip(id){let g=GEAR[id];state.eq[g.slot]=id;save();openPanel('gear')}window.equip=equip;
function openQuest(id){let q=QUESTS[id],st=state.quests[id],r=st=='active'&&has(q.need),need=Object.entries(q.need).map(([k,v])=>`${nm(k)} ${(state.inv[k]||0)}/${v}`).join(', ');modal('📜 Quest',q.npc,`<div class='card ${r?'ready':''}'><b>${q.text}</b><div class='small'>Need: ${need}</div><div>Status: ${r?'Ready':st}</div>${st=='not_started'?`<button onclick='startQuest("${id}")'>Accept</button>`:''}${r?`<button onclick='turnQuest("${id}")'>Turn In</button>`:''}</div>`)}function questPanel(){modal('📜 Quests','Village jobs',Object.keys(QUESTS).map(id=>`<div class='card'><b>${QUESTS[id].npc}</b><div>${QUESTS[id].text}</div><button onclick='openQuest("${id}")'>View</button></div>`).join(''))}function startQuest(id){state.quests[id]='active';save();openQuest(id)}function turnQuest(id){let q=QUESTS[id];if(!has(q.need))return;take(q.need);state.gold+=q.reward.gold;Object.entries(q.reward.xp).forEach(([k,v])=>gain(k,v));state.quests[id]='complete';log('Quest complete: '+q.npc);save();openQuest(id)}window.openQuest=openQuest;window.startQuest=startQuest;window.turnQuest=turnQuest;
function road(x,y){return(y>=8&&y<=9&&x>=2&&x<=16)||(x>=6&&x<=11&&y>=5&&y<=6)||(x>=8&&x<=9&&y>=4&&y<=13)||(x>=3&&x<=9&&y>=12&&y<=13)||(x>=9&&x<=13&&y>=10&&y<=11)}function tileType(x,y){if(state.zone=='CopperHills'){if(x==2||y==13)return'dirt';return(x+y)%3?'rock':'rock2'}if(road(x,y))return'dirt';if(x>17&&y>5&&y<12)return'water';return(x+y)%2?'grass2':'grass'}function poly(p,f,s='#ffffff12'){ctx.beginPath();ctx.moveTo(p[0].x,p[0].y);for(let i=1;i<p.length;i++)ctx.lineTo(p[i].x,p[i].y);ctx.closePath();ctx.fillStyle=f;ctx.fill();ctx.strokeStyle=s;ctx.stroke()}function ell(x,y,rx,ry,f){ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,7);ctx.fillStyle=f;ctx.fill()}function tile(x,y){return[scr(x,y),scr(x+1,y),scr(x+1,y+1),scr(x,y+1)]}function drawTile(x,y,t){let col={grass:'#176b37',grass2:'#145d31',dirt:'#a44912',rock:'#475569',rock2:'#64748b',water:'#075985'}[t];poly(tile(x,y),col,t=='water'?'#7dd3fc44':'#ffffff0c')}function cen(e,z=0){return scr(e.x+(e.w||1)/2,e.y+(e.h||1)/2,z)}function drawEnt(e){let p=cen(e);ell(p.x,p.y+10,22,7,'#0005');if(e.kind=='building'||e.kind=='station'){let top=cen(e,1.1);ctx.font='38px system-ui';ctx.textAlign='center';ctx.fillText(e.icon,top.x,top.y);return}if(e.kind=='res'&&e.res=='logs'){let t=cen(e,1.5);ctx.strokeStyle='#7c2d12';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(t.x,t.y+18);ctx.stroke();ell(t.x,t.y,28,20,'#166534');return}if(e.kind=='res'&&e.res=='rawFish'){poly([scr(e.x,e.y),scr(e.x+2,e.y),scr(e.x+2,e.y+2),scr(e.x,e.y+2)],'#075985','#7dd3fc55')}ctx.font='28px system-ui';ctx.textAlign='center';ctx.fillText(e.icon||'🙂',p.x,p.y-6)}function drawPlayer(){let p=scr(state.player.x,state.player.y);ell(p.x,p.y+13,18,7,'#0006');ctx.fillStyle='#0f766e';ctx.beginPath();ctx.arc(p.x,p.y-4,15,0,7);ctx.fill();ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(p.x,p.y-22,14,0,7);ctx.fill()}function depth(e){return cen(e).y+(e.solid?24:10)}function draw(){ctx.clearRect(0,0,c.width,c.height);for(let y=-4;y<world.h+4;y++)for(let x=-4;x<world.w+4;x++)drawTile(x,y,tileType(x,y));let a=ents().map(e=>({e,d:depth(e)}));a.push({player:1,d:scr(state.player.x,state.player.y).y+14});a.sort((x,y)=>x.d-y.d).forEach(o=>o.player?drawPlayer():drawEnt(o.e));near().forEach(e=>{let p=cen(e);ctx.strokeStyle='#facc15dd';ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(p.x,p.y+9,30,12,0,0,7);ctx.stroke()})}
function render(){ui.stats.innerHTML=`<span class='pill'>💰 ${state.gold}g</span><span class='pill'>❤️ ${state.hp}/${state.maxHp}</span><span class='pill'>🎒 ${used()}/${state.bagMax}</span><span class='pill'>⭐ ${near().length}</span>`;ui.hud.innerHTML=`<span class='pill'>${state.zone}</span><span class='pill'>Nearby ${near().length}</span>`;ui.camBtn.textContent='🎥 Camera '+CAMS[state.camera];$('bank').style.display=near().some(e=>e.id=='bank')?'block':'none';$('shop').style.display=near().some(e=>e.id=='shop')?'block':'none'}function loop(now){let dt=Math.min(.05,(now-last)/1000);last=now;update(dt);if(job){let p=Math.min(1,(now-job.start)/job.dur);ui.bar.style.width=p*100+'%';if(p>=1)finish()}draw();render();requestAnimationFrame(loop)}requestAnimationFrame(loop);
addEventListener('keydown',e=>keys[e.key]=1);addEventListener('keyup',e=>keys[e.key]=0);document.querySelectorAll('[data-dir]').forEach(b=>{let d=b.dataset.dir,on=e=>{e.preventDefault();keys[d]=1},off=e=>{e&&e.preventDefault();keys[d]=0};b.addEventListener('pointerdown',on);b.addEventListener('pointerup',off);b.addEventListener('pointercancel',off);b.addEventListener('pointerleave',off)});$('use').onclick=useNear;$('bag').onclick=()=>openPanel('bag');$('skills').onclick=()=>openPanel('skills');$('gear').onclick=()=>openPanel('gear');$('quests').onclick=()=>openPanel('quests');$('bank').onclick=()=>openPanel('bank');$('shop').onclick=()=>openPanel('shop');$('menu').onclick=()=>modal('☰ Menu','Standalone V24',`<div class='grid'><a href='../../index.html'>← Arcade</a><button onclick='save();log("Game saved.");closePanel()'>Save</button><button onclick='if(confirm("Reset V24 save?")){localStorage.removeItem(SAVE);location.reload()}'>Reset</button><button onclick='openPanel("log")'>Log</button></div>`);ui.camBtn.onclick=()=>ui.cam.classList.toggle('open');document.querySelectorAll('[data-cam]').forEach(b=>b.onclick=()=>{state.camera=(state.camera+Number(b.dataset.cam)+8)%8;save()});document.querySelectorAll('[data-set]').forEach(b=>b.onclick=()=>{state.camera=CAMS.indexOf(b.dataset.set);ui.cam.classList.remove('open');save()});
</script>
