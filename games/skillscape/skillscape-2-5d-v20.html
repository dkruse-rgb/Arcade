<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Skillscape 2.5D Prototype V20</title>
  <style>
    html,body{margin:0;min-height:100%;background:#020617;overflow:auto}
    iframe{display:block;width:100%;height:100dvh;min-height:100svh;border:0;background:#020617}
  </style>
</head>
<body>
  <iframe id="v20Frame" src="skillscape-2-5d-v16.html?v=terrain-polish-v20" title="Skillscape 2.5D Prototype V20"></iframe>
  <script>
    const v20Frame=document.getElementById('v20Frame');

    function findGame(doc,depth=0){
      if(!doc||depth>28)return null;
      try{
        if(doc.getElementById('game')&&doc.defaultView)return {doc,win:doc.defaultView};
        for(const f of [...doc.querySelectorAll('iframe')]){
          const hit=findGame(f.contentDocument,depth+1);
          if(hit)return hit;
        }
      }catch(e){return null;}
      return null;
    }

    function patch(){
      let hit;
      try{ hit=findGame(v20Frame.contentDocument); }catch(e){ return; }
      if(!hit)return;
      const d=hit.doc,w=hit.win;

      try{
        w.eval(`
          if(!window.__v20TerrainPolish){
            window.__v20TerrainPolish=true;

            function v20Poly(points,fill,stroke='rgba(255,255,255,.13)',lw=1){
              if(!points||!points.length)return;
              ctx.beginPath();
              ctx.moveTo(points[0].x,points[0].y);
              for(let i=1;i<points.length;i++)ctx.lineTo(points[i].x,points[i].y);
              ctx.closePath();
              ctx.fillStyle=fill;ctx.fill();
              if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
            }
            function v20Ellipse(cx,cy,rx,ry,fill,stroke=null,lw=1){
              ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fillStyle=fill;ctx.fill();
              if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
            }
            function v20RoundRect(x,y,w,h,r,fill,stroke=null){
              ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fillStyle=fill;ctx.fill();
              if(stroke){ctx.strokeStyle=stroke;ctx.stroke();}
            }
            function v20Dark(hex,amt=.25){
              const n=parseInt(hex.slice(1),16),r=(n>>16)&255,g=(n>>8)&255,b=n&255;
              const nr=Math.max(0,Math.floor(r*(1-amt))),ng=Math.max(0,Math.floor(g*(1-amt))),nb=Math.max(0,Math.floor(b*(1-amt)));
              return '#'+((1<<24)+(nr<<16)+(ng<<8)+nb).toString(16).slice(1);
            }
            function v20Light(hex,amt=.16){
              const n=parseInt(hex.slice(1),16),r=(n>>16)&255,g=(n>>8)&255,b=n&255;
              const nr=Math.min(255,Math.floor(r+(255-r)*amt)),ng=Math.min(255,Math.floor(g+(255-g)*amt)),nb=Math.min(255,Math.floor(b+(255-b)*amt));
              return '#'+((1<<24)+(nr<<16)+(ng<<8)+nb).toString(16).slice(1);
            }
            function v20Corners(e,z=0,pad=0){
              const x=e.x-pad,y=e.y-pad,w=(e.w||1)+pad*2,h=(e.h||1)+pad*2;
              return {
                nw:screen(x,y,z),
                ne:screen(x+w,y,z),
                se:screen(x+w,y+h,z),
                sw:screen(x,y+h,z),
                c:screen(x+w/2,y+h/2,z)
              };
            }
            function v20Avg(points){
              return points.reduce((a,p)=>({x:a.x+p.x/points.length,y:a.y+p.y/points.length}),{x:0,y:0});
            }
            function v20Badge(icon,x,y,size=34){
              v20RoundRect(x-size/2,y-size/2,size,size,10,'rgba(2,6,23,.78)','rgba(255,255,255,.14)');
              ctx.font=Math.floor(size*.58)+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(icon,x,y+1);
            }
            function v20Shadow(e){
              const c=v20Corners(e,0).c;
              v20Ellipse(c.x,c.y+10,Math.max(20,(e.w+e.h)*14),Math.max(7,(e.w+e.h)*5),'rgba(0,0,0,.28)');
              return c;
            }
            function v20Hash(x,y){
              const s=Math.sin(x*127.1+y*311.7)*43758.5453;
              return s-Math.floor(s);
            }
            function v20LooksLikeBlocks(arr){
              return Array.isArray(arr) && arr.length>4 && arr.length<2500 && arr.filter(o=>o && typeof o.x==='number' && typeof o.y==='number').length > Math.max(3,arr.length*0.55);
            }
            function v20FindBlocks(){
              const direct=['blocks','worldBlocks','mapBlocks','zoneBlocks','entities','objects','tiles','zoneTiles','map'];
              for(const key of direct){ if(v20LooksLikeBlocks(window[key])) return window[key]; }
              for(const key of Object.keys(window)){
                let v;
                try{ v=window[key]; }catch(e){ continue; }
                if(v20LooksLikeBlocks(v)) return v;
                if(v && typeof v==='object'){
                  for(const child of ['blocks','entities','objects','tiles','mapBlocks','zoneBlocks']){
                    try{ if(v20LooksLikeBlocks(v[child])) return v[child]; }catch(e){}
                  }
                }
              }
              return [];
            }
            function v20Bounds(list){
              if(!list||!list.length)return null;
              let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
              for(const e of list){
                if(!e || typeof e.x!=='number' || typeof e.y!=='number')continue;
                const w=(typeof e.w==='number' && e.w>0)?e.w:1;
                const h=(typeof e.h==='number' && e.h>0)?e.h:1;
                minX=Math.min(minX,e.x);
                minY=Math.min(minY,e.y);
                maxX=Math.max(maxX,e.x+w);
                maxY=Math.max(maxY,e.y+h);
              }
              if(!isFinite(minX))return null;
              return {minX,maxX,minY,maxY};
            }
            function v20TilePoly(x,y,z=0){
              return [screen(x,y,z),screen(x+1,y,z),screen(x+1,y+1,z),screen(x,y+1,z)];
            }
            function v20DrawGrassTile(x,y,edgeStrength=0){
              const pts=v20TilePoly(x,y,0);
              const noise=v20Hash(x,y);
              const palette=['#166534','#1f7a3f','#15803d','#177246'];
              let col=palette[Math.floor(noise*palette.length)];
              if(edgeStrength>0)col=v20Dark(col,Math.min(.38,edgeStrength*.18));
              v20Poly(pts,col,'rgba(255,255,255,.05)',0.8);
              const c={x:(pts[0].x+pts[1].x+pts[2].x+pts[3].x)/4,y:(pts[0].y+pts[1].y+pts[2].y+pts[3].y)/4};
              if(noise>.72){
                ctx.strokeStyle='rgba(220,252,231,.08)';
                ctx.lineWidth=1.4;
                ctx.beginPath();
                ctx.moveTo(c.x-5,c.y+2);
                ctx.lineTo(c.x+4,c.y-2);
                ctx.stroke();
              }
            }
            function v20DrawFringeDeco(x,y,depthFactor=0){
              const c=screen(x+.5,y+.5,0);
              const noise=v20Hash(x*3.17,y*1.93);
              if(noise>.83){
                v20Ellipse(c.x,c.y+9,20,7,'rgba(0,0,0,.18)');
                ctx.strokeStyle='#7c2d12';ctx.lineWidth=6;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(c.x,c.y+8);ctx.lineTo(c.x,c.y-12);ctx.stroke();
                v20Ellipse(c.x,c.y-22,20,14,v20Dark('#16a34a',depthFactor*.08),null);
                v20Ellipse(c.x-12,c.y-15,14,11,v20Dark('#15803d',depthFactor*.06),null);
                v20Ellipse(c.x+12,c.y-15,14,11,v20Dark('#166534',depthFactor*.08),null);
              }else if(noise<.12){
                v20Ellipse(c.x,c.y+8,17,6,'rgba(0,0,0,.15)');
                const pts=[{x:c.x-16,y:c.y+7},{x:c.x-8,y:c.y-7},{x:c.x+10,y:c.y-9},{x:c.x+16,y:c.y+2},{x:c.x+7,y:c.y+11},{x:c.x-12,y:c.y+10}];
                v20Poly(pts,v20Dark('#475569',depthFactor*.06),'rgba(255,255,255,.08)',1);
              }
            }
            function v20DrawBackdrop(){
              const blocks=v20FindBlocks();
              const b=v20Bounds(blocks);
              if(!b)return;

              const pad=5;
              for(let x=Math.floor(b.minX)-pad;x<Math.ceil(b.maxX)+pad;x++){
                for(let y=Math.floor(b.minY)-pad;y<Math.ceil(b.maxY)+pad;y++){
                  const dx=Math.max(b.minX-x, x-(b.maxX-1), 0);
                  const dy=Math.max(b.minY-y, y-(b.maxY-1), 0);
                  const edge=Math.max(dx,dy);
                  v20DrawGrassTile(x,y,edge);
                  if(edge>0 && v20Hash(x+11.7,y+4.3)>.78) v20DrawFringeDeco(x,y,edge);
                }
              }

              // darker edge fog to make the overscan feel intentional and reduce the "world opening up" effect.
              const grd=ctx.createRadialGradient(canvas.width/2,canvas.height/2,Math.min(canvas.width,canvas.height)*0.24,canvas.width/2,canvas.height/2,Math.max(canvas.width,canvas.height)*0.72);
              grd.addColorStop(0,'rgba(2,6,23,0)');
              grd.addColorStop(.78,'rgba(2,6,23,.04)');
              grd.addColorStop(1,'rgba(2,6,23,.16)');
              ctx.fillStyle=grd;
              ctx.fillRect(0,0,canvas.width,canvas.height);
            }

            function v20DrawCameraBuilding(e){
              v20Shadow(e);
              let roof='#c2410c',wall='#d6b58a',icon=e.icon||'🏠';
              if(e.id==='bank'){roof='#2563eb';wall='#dbeafe';icon='🏦'}
              if(e.id==='shop'){roof='#d97706';wall='#fde68a';icon='🏪'}
              if(e.id==='smithy'||e.id==='hillFurnace'){roof='#475569';wall='#94a3b8';icon=e.id==='hillFurnace'?'🔥':'⚒️'}
              if(e.id==='inn'){roof='#c2410c';wall='#fed7aa';icon='🛏️'}

              const z=e.z||1.5;
              const b=v20Corners(e,0);
              const t=v20Corners(e,z*.72);
              const r=v20Corners(e,z*.98,.18);

              const faces=[
                {pts:[b.nw,b.ne,t.ne,t.nw],col:v20Light(wall,.05)},
                {pts:[b.ne,b.se,t.se,t.ne],col:v20Dark(wall,.25)},
                {pts:[b.se,b.sw,t.sw,t.se],col:v20Dark(wall,.16)},
                {pts:[b.sw,b.nw,t.nw,t.sw],col:v20Dark(wall,.08)}
              ];
              faces.sort((a,b)=>v20Avg(a.pts).y-v20Avg(b.pts).y).forEach(f=>v20Poly(f.pts,f.col,'rgba(255,255,255,.10)'));

              v20Poly([r.nw,r.ne,r.se,r.sw],roof,'rgba(255,255,255,.18)',1.4);
              v20Poly([r.ne,r.se,r.c],v20Dark(roof,.14),null);
              v20Poly([r.sw,r.nw,r.c],v20Light(roof,.08),null);

              const front=[b.nw,b.ne,b.se,b.sw].sort((a,b)=>b.y-a.y).slice(0,2);
              const dc={x:(front[0].x+front[1].x)/2,y:(front[0].y+front[1].y)/2};
              v20RoundRect(dc.x-11,dc.y-34,22,32,5,'#3f1f12','rgba(255,255,255,.15)');
              ctx.fillStyle='rgba(251,191,36,.85)';ctx.beginPath();ctx.arc(dc.x+6,dc.y-17,2.2,0,Math.PI*2);ctx.fill();

              const rc=v20Corners(e,z*1.15,.18).c;
              v20Badge(icon,rc.x,rc.y-8,36);
            }

            function v20DrawCameraTree(e){
              const c=v20Shadow(e);const s=e.id==='tree2'?1.12:1;
              const top=screen(e.x+(e.w||1)/2,e.y+(e.h||1)/2,(e.z||1.7));
              const trunkBase=screen(e.x+(e.w||1)/2,e.y+(e.h||1)/2,.18);
              ctx.strokeStyle='#7c2d12';ctx.lineWidth=10*s;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(trunkBase.x,trunkBase.y);ctx.lineTo(top.x,top.y+24*s);ctx.stroke();
              v20Ellipse(top.x,top.y-2,30*s,22*s,'#166534','rgba(255,255,255,.13)');
              v20Ellipse(top.x-18*s,top.y+8*s,21*s,17*s,'#15803d');
              v20Ellipse(top.x+17*s,top.y+8*s,21*s,17*s,'#14532d');
              v20Ellipse(top.x,top.y+16*s,25*s,18*s,'#16a34a');
              v20Badge(e.id==='tree2'?'🌳':'🌲',top.x,top.y+4,32);
            }

            function v20DrawCameraRock(e,kind='iron'){
              v20Shadow(e);
              const c=v20Corners(e,.38).c;
              const base=kind==='copper'?'#b45309':'#475569';const hi=kind==='copper'?'#f59e0b':'#cbd5e1';
              const pts=[
                {x:c.x-30,y:c.y+8},{x:c.x-14,y:c.y-18},{x:c.x+18,y:c.y-22},{x:c.x+34,y:c.y-2},{x:c.x+14,y:c.y+18},{x:c.x-20,y:c.y+17}
              ];
              v20Poly(pts,base,'rgba(255,255,255,.16)',1.2);
              v20Poly([pts[1],{x:c.x+2,y:c.y-5},pts[2]],v20Light(base,.18),null);
              v20Poly([pts[5],{x:c.x+2,y:c.y-5},pts[4]],v20Dark(base,.2),null);
              ctx.strokeStyle=hi;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(c.x-13,c.y-2);ctx.lineTo(c.x-3,c.y-11);ctx.moveTo(c.x+7,c.y+4);ctx.lineTo(c.x+18,c.y-5);ctx.stroke();
              v20Badge('⛏️',c.x,c.y-37,32);
            }

            function v20DrawCameraWaterSpot(e){
              const b=v20Corners(e,0,.08);v20Poly([b.nw,b.ne,b.se,b.sw],'#075985','rgba(125,211,252,.28)');
              const c=b.c;ctx.strokeStyle='rgba(186,230,253,.6)';ctx.lineWidth=2;
              for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(c.x-26,c.y+i*9);ctx.quadraticCurveTo(c.x,c.y-7+i*9,c.x+26,c.y+i*9);ctx.stroke();}
              v20Badge('🎣',c.x+3,c.y-24,34);
            }

            function v20DrawTravel(e){
              const c=v20Shadow(e);const top=screen(e.x+(e.w||1)/2,e.y+(e.h||1)/2,.35);
              v20Ellipse(top.x,top.y,28,12,'rgba(91,33,182,.75)','rgba(216,180,254,.55)',2);
              ctx.strokeStyle='rgba(216,180,254,.75)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(top.x,top.y-16,18,Math.PI*.15,Math.PI*1.85);ctx.stroke();
              v20Badge(e.targetZone==='Village'?'🏡':'⛰️',top.x,top.y-17,34);
            }

            const prevClearRect=ctx.clearRect.bind(ctx);
            ctx.clearRect=function(){
              prevClearRect(...arguments);
              try{ v20DrawBackdrop(); }catch(err){}
            };

            const prevDrawBlock=drawBlock;
            window.drawBlock=function(e){
              if(!e)return;
              if(e.id==='pond')return v20DrawCameraWaterSpot(e);
              if(e.kind==='travel')return v20DrawTravel(e);
              if(e.id&&/tree/i.test(e.id))return v20DrawCameraTree(e);
              if(e.name&&/Copper rock/i.test(e.name))return v20DrawCameraRock(e,'copper');
              if(e.name&&/Iron rock/i.test(e.name))return v20DrawCameraRock(e,'iron');
              if(e.kind==='door')return v20DrawCameraBuilding(e);
              return prevDrawBlock(e);
            };

            addLog('V20 loaded: terrain padding, natural border polish, and camera-aware props enabled.');
          }
        `);
      }catch(e){console.warn('V20 terrain polish patch failed',e);}
    }

    v20Frame.addEventListener('load',()=>{
      patch();
      let ticks=0;
      const t=setInterval(()=>{patch();ticks++;if(ticks>190)clearInterval(t)},250);
    });
    setInterval(patch,1000);
  </script>
</body>
</html>
